<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>本机服务面板</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b9fd4;
      --accent-hover: #7ab3e0;
      --accent-muted: rgba(91, 159, 212, 0.18);
      --success: #6bcf7f;
      --radius: 12px;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      display: flex;
      flex-direction: column;
      font-family: var(--font);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, transparent 50%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1.25rem 1.25rem 1.5rem;
      overflow: hidden;
    }

    .page-header {
      flex-shrink: 0;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0;
    }

    .shell {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 3fr;
      gap: 1rem;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .col-left,
    .col-right {
      min-height: 0;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
    }

    .col-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.85rem;
    }

    .col-left .col-scroll {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    button.sidebar-card {
      margin: 0;
      padding: 0.85rem 1rem;
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.2);
      border: 2px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      flex: 0 0 auto;
      height: 7.75rem;
      transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    button.sidebar-card:hover {
      border-color: #3d4f66;
      background: rgba(255, 255, 255, 0.03);
    }

    button.sidebar-card.is-selected {
      border-color: var(--accent);
      background: var(--accent-muted);
      box-shadow: 0 0 0 1px var(--accent);
    }

    button.sidebar-card h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    button.sidebar-card .desc {
      margin: 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      flex: 1;
      min-height: 0;
    }

    button.sidebar-card .url-line {
      font-size: 0.75rem;
      word-break: break-all;
      margin: 0;
      color: var(--accent);
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .detail-toolbar {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.85rem;
      border-bottom: 1px solid var(--border);
    }

    .detail-toolbar a.tool-btn,
    .detail-toolbar button.tool-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    a.tool-btn.primary {
      background: var(--accent);
      color: #0a0e14;
      border: none;
    }

    a.tool-btn.primary:hover {
      background: var(--accent-hover);
    }

    button.tool-btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.tool-btn.secondary:hover {
      border-color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
    }

    button.tool-btn.secondary.copied {
      border-color: var(--success);
      color: var(--success);
    }

    .detail-body {
      padding: 0;
    }

    .detail-body .col-scroll-inner {
      padding: 1rem 1.1rem 1.25rem;
    }

    pre.restart-full {
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.8125rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
    }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>本机服务面板</h1>
    <p class="subtitle">纯静态页面；左栏选择服务，右栏查看完整重启说明。</p>
  </header>

  <div class="shell">
    <aside class="col-left" aria-label="服务列表">
      <div class="col-scroll">
        <button
          type="button"
          class="sidebar-card is-selected"
          data-service="knowledge-platform"
          data-open-url="http://localhost:5173"
        >
          <h2>知识平台</h2>
          <p class="desc">
            文档管理：前置 Docker（PostgreSQL、Redis）；前端 Vite，后端 Nest。
          </p>
          <p class="url-line">http://localhost:5173</p>
        </button>

        <button
          type="button"
          class="sidebar-card"
          data-service="work-assistant"
          data-open-url="http://localhost:5001"
        >
          <h2>工作小助手</h2>
          <p class="desc">
            本仓库 gua_file：Flask 应用，默认端口 5001（可用环境变量 PORT 覆盖）。
          </p>
          <p class="url-line">http://localhost:5001</p>
        </button>

        <button
          type="button"
          class="sidebar-card"
          data-service="placeholder"
          data-open-url="https://example.com"
        >
          <h2>占位服务</h2>
          <p class="desc">在此改服务名称与说明；重启全文在脚本 RESTART_TEXTS 中替换。</p>
          <p class="url-line">https://example.com</p>
        </button>
      </div>
    </aside>

    <section class="col-right" aria-label="重启说明">
      <div class="detail-toolbar">
        <a
          id="open-url-btn"
          class="tool-btn primary"
          href="http://localhost:5173"
          target="_blank"
          rel="noopener noreferrer"
        >打开网址</a>
        <button type="button" id="copy-cmd-btn" class="tool-btn secondary">复制命令</button>
      </div>
      <div class="detail-body col-scroll">
        <div class="col-scroll-inner">
          <pre id="restart-full" class="restart-full" aria-live="polite"></pre>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var RESTART_TEXTS = {
        "knowledge-platform":
          "GitHub 仓库：knowledge_management_tools\n\n" +
          "在运行中的终端按 Ctrl+C 停止当前进程，然后按顺序执行：\n\n" +
          "前置：已启动 Docker；PostgreSQL、Redis 已在跑。\n\n" +
          "cd /Users/a53828/Documents/TaoPig/document_management\n" +
          "docker compose up -d postgres redis\n" +
          "# .env：cp .env.example .env\n\n" +
          "# 终端 1 — 后端（Nest，端口 3000）\n" +
          "cd /Users/a53828/Documents/TaoPig/document_management/backend\n" +
          "npm install   # 依赖有变时再执行\n" +
          "npm run start:dev\n\n" +
          "# 终端 2 — 前端（新开终端）\n" +
          "cd /Users/a53828/Documents/TaoPig/document_management/frontend\n" +
          "npm install   # 依赖有变时再执行\n" +
          "npm run dev",
        "work-assistant":
          "GitHub 仓库：cursor_tools\n\n" +
          "在运行 Flask 的终端按 Ctrl+C 停止，然后：\n\n" +
          "cd /Users/a53828/Documents/TaoPig/gua_file\n" +
          "source .venv/bin/activate   # 若无 venv 可跳过\n" +
          "pip install -r requirements.txt   # 依赖有变时再执行\n" +
          "python app.py",
        placeholder:
          "GitHub 仓库：https://github.com/your-username/your-repo\n\n" +
          "（占位）在对应终端按 Ctrl+C 停止后：\n\n" +
          "cd /path/to/your/project\n" +
          "# source venv/bin/activate\n" +
          "# 你的启动命令"
      };

      var cards = document.querySelectorAll(".sidebar-card");
      var openUrlBtn = document.getElementById("open-url-btn");
      var copyBtn = document.getElementById("copy-cmd-btn");
      var restartPre = document.getElementById("restart-full");
      var currentId = null;

      function fallbackCopy(text) {
        window.prompt("复制未成功，请全选下方文字并手动复制（Ctrl+C / Cmd+C）：", text);
      }

      function setCopyBtnState(on) {
        copyBtn.classList.toggle("copied", on);
        copyBtn.textContent = on ? "已复制" : "复制命令";
      }

      function selectService(id, url) {
        currentId = id;
        cards.forEach(function (c) {
          c.classList.toggle("is-selected", c.getAttribute("data-service") === id);
        });
        openUrlBtn.href = url;
        restartPre.textContent = RESTART_TEXTS[id] || "";
      }

      cards.forEach(function (card) {
        card.addEventListener("click", function () {
          selectService(
            card.getAttribute("data-service"),
            card.getAttribute("data-open-url") || "#"
          );
        });
      });

      copyBtn.addEventListener("click", function () {
        var text = currentId ? RESTART_TEXTS[currentId] : "";
        if (!text) return;

        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          navigator.clipboard.writeText(text).then(
            function () {
              setCopyBtnState(true);
              window.setTimeout(function () {
                setCopyBtnState(false);
              }, 2000);
            },
            function () {
              fallbackCopy(text);
            }
          );
        } else {
          fallbackCopy(text);
        }
      });

      var first = document.querySelector(".sidebar-card.is-selected") || cards[0];
      if (first) {
        selectService(
          first.getAttribute("data-service"),
          first.getAttribute("data-open-url") || "#"
        );
      }
    })();
  </script>
</body>
</html>
