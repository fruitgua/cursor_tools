<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/frog.png">
    <title>待办事项 - 工作小助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css">
    <style>
        /* 待办事项页面专用样式（其余使用全局 style.css） */

        /* 顶部新增区域：根据 UI 规范将控件水平间距统一为 10px */
        .control-panel {
            padding: 12px 10px 8px;
        }

        .control-panel .control-row {
            gap: 10px;
        }

        /* 覆盖全局 field-group 的 margin-right/gap，使字段间真实间距为 10px */
        .control-panel .field-group {
            margin-right: 0;
            gap: 10px;
        }

        /* 顶部三个输入控件高度统一为 36px（与下拉一致） */
        .control-panel .field-control {
            height: 36px;
            box-sizing: border-box;
        }

        /* 顶部“添加待办”按钮高度与输入框一致（36px） */
        #btn-add-todo {
            height: 36px;
            box-sizing: border-box;
        }

        .todo-main-layout {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
            margin-top: 8px;
        }

        .todo-column {
            flex: 1 1 50%;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .todo-column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            min-height: 44px; /* 统一左右标题行高度 */
            padding-left: 12px; /* 左侧与列表内容对齐 */
            box-sizing: border-box;
        }

        .todo-column-title {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
        }

        .todo-list-container {
            flex: 1;
            min-height: 0;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
            padding: 12px 12px 8px;
            overflow-y: auto;
        }

        .todo-card {
            position: relative;
            padding: 12px 12px 10px;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5e7eb;
            margin-bottom: 10px;
            transition: box-shadow 0.15s, transform 0.05s, border-color 0.15s,
                background-color 0.15s;
        }

        .todo-card:hover {
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.16);
            transform: translateY(-1px);
            border-color: #93c5fd;
        }

        .todo-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }

        .todo-card-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }

        .todo-checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .category-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            white-space: nowrap;
        }

        .badge-work {
            background-color: #2563eb;
        }

        .badge-study {
            background-color: #7c3aed;
        }

        .badge-life {
            background-color: #16a34a;
        }

        .badge-shopping {
            background-color: #f97316;
        }

        .badge-other {
            background-color: #6b7280;
        }

        .todo-card-content {
            font-size: 14px;
            color: #111827;
            line-height: 1.6;
            word-break: break-word;
            /* 与分类标签左侧对齐（checkbox 16px + 间距约 8px） */
            margin-left: 24px;
        }

        .todo-meta {
            margin-top: 4px;
            font-size: 11px;
            color: #9ca3af;
        }

        .card-actions {
            position: absolute;
            top: 6px;
            right: 8px;
            display: flex;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .todo-card:hover .card-actions {
            opacity: 1;
            pointer-events: auto;
        }

        .card-action-btn {
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 999px;
            border: 1px solid transparent;
            background: rgba(17, 24, 39, 0.02);
            color: #374151;
            cursor: pointer;
        }

        .card-action-btn:hover {
            background: rgba(37, 99, 235, 0.06);
            border-color: rgba(37, 99, 235, 0.4);
        }

        .card-action-btn.delete {
            color: #b91c1c;
        }

        .card-action-btn.delete:hover {
            background: rgba(220, 38, 38, 0.06);
            border-color: rgba(220, 38, 38, 0.4);
        }

        .empty-state {
            font-size: 13px;
            color: #9ca3af;
            text-align: center;
            padding: 24px 12px;
        }

        .done-item {
            padding: 10px 10px 8px;
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            margin-bottom: 8px;
            background-color: #f9fafb;
            font-size: 13px;
            line-height: 1.5;
        }

        .done-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
            gap: 8px;
            flex-wrap: wrap;
        }

        .done-top-left {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            flex: 1;
            min-width: 0;
            flex-wrap: wrap;
        }

        .done-content {
            color: #111827;
            word-break: break-word;
        }

        .done-date {
            font-size: 11px;
            color: #9ca3af;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.25);
            padding: 20px 24px 18px;
            max-width: 480px;
            width: 100%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #6b7280;
        }

        .modal-close:hover {
            color: #111827;
        }

        .modal-body {
            margin-bottom: 14px;
        }

        .modal-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
        }

        .modal-row label {
            font-size: 13px;
            color: #374151;
        }

        .modal-row input,
        .modal-row textarea,
        .modal-row select {
            width: 100%;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            background-color: #ffffff;
        }

        .modal-row textarea {
            resize: vertical;
            min-height: 60px;
        }

        .modal-row input:focus,
        .modal-row textarea:focus,
        .modal-row select:focus {
            outline: 2px solid #2563eb33;
            outline-offset: 1px;
            border-color: #2563eb;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .btn-danger {
            background-color: #dc2626;
            color: #ffffff;
            border-color: #dc2626;
        }

        .btn-danger:hover:not(:disabled) {
            background-color: #b91c1c;
            box-shadow: 0 1px 3px rgba(220, 38, 38, 0.5);
        }

        /* 待办页面分类下拉白底 */
        #new-category,
        #done-filter,
        #edit-category {
            background-color: #ffffff;
        }

        /* 完成列表分类筛选靠右对齐 */
        .todo-filter-group {
            margin-left: auto;
            padding-right: 0; /* 右侧紧贴列边界 */
        }

        @media (max-width: 900px) {
            .todo-main-layout {
                flex-direction: column;
            }
        }

        /* 桌面：返回首页显示文字，隐藏 icon */
        .btn-go-home-icon { display: none; }
        .btn-go-home-text { display: inline; }

        /* H5：仅显示新增 + 待办事项，待办区域可上下滚动；隐藏切换模板，返回首页仅 icon；新增区域控件两行自适应 */
        @media (max-width: 720px) {
            #theme-switcher-container.header-action-theme { display: none !important; }
            .btn-go-home-icon { display: inline; font-size: 18px; line-height: 1; }
            .btn-go-home-text { display: none; }
            .btn-go-home { min-width: 36px; padding-left: 10px; padding-right: 10px; }

            /* 顶部新增区域：两行排布
               第一行：提醒时间 + 类型
               第二行：内容 + 添加按钮（内容区域更宽） */
            .control-panel .control-row {
                flex-wrap: wrap;
            }
            .control-panel .control-row > .field-group,
            .control-panel .control-row > #btn-add-todo {
                flex: 1 1 50%;
                min-width: 0;
            }
            /* 第三个字段（内容）占比更大，按钮占比更小 */
            .control-panel .control-row > .field-group:nth-child(3) {
                flex: 1 1 65%;
            }
            .control-panel .control-row > #btn-add-todo {
                flex: 1 1 35%;
            }

            .app-container {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
            }
            .app-container .todo-main-layout {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
            }
            .app-container .todo-main-layout .todo-column:first-child {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
            }
            .app-container .todo-main-layout .todo-column:first-child .todo-list-container {
                flex: 1;
                min-height: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            .todo-column-done {
                display: none !important;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header app-header-with-action">
        <div class="app-header-left">
            <h1>待办事项</h1>
        </div>
        <div class="header-actions">
            <div id="theme-switcher-container" class="header-action-theme"></div>
            <button id="btn-go-home" class="btn btn-go-home" title="返回首页" aria-label="返回首页"><span class="btn-go-home-icon" aria-hidden="true">⌂</span><span class="btn-go-home-text">返回首页</span></button>
        </div>
    </header>

    <!-- 顶部新增待办表单 -->
    <section class="control-panel">
        <div class="control-row">
            <div class="field-group">
                <input id="new-due" type="datetime-local" class="field-control" style="min-width: 220px;" title="提醒时间" />
            </div>
            <div class="field-group">
                <select id="new-category" class="field-control" data-ui-select="single">
                    <option value="work">工作</option>
                    <option value="study">学习</option>
                    <option value="organize">整理</option>
                    <option value="life">生活</option>
                    <option value="shopping">购物</option>
                    <option value="other">其他</option>
                </select>
            </div>
            <div class="field-group" style="flex:1; min-width: 260px;">
                <input id="new-content" type="text" class="field-control" style="flex:1; min-width: 200px;"
                       placeholder="请输入待办内容" />
            </div>
            <button id="btn-add-todo" class="btn primary">添加待办</button>
        </div>
    </section>

    <!-- 主体左右区域 -->
    <div class="todo-main-layout">
        <!-- 左侧：待办卡片 -->
        <div class="todo-column">
            <div class="todo-column-header">
                <div class="todo-column-title">待办事项</div>
            </div>
            <div id="todo-list" class="todo-list-container"></div>
        </div>

        <!-- 右侧：完成列表（H5 下隐藏） -->
        <div class="todo-column todo-column-done">
            <div class="todo-column-header">
                <div class="todo-column-title">已完成</div>
                <div class="field-group todo-filter-group">
                <select id="done-filter" class="field-control" style="min-width:120px;" data-ui-select="single">
                        <option value="all">全部</option>
                        <option value="work">工作</option>
                        <option value="study">学习</option>
                        <option value="organize">整理</option>
                        <option value="life">生活</option>
                        <option value="shopping">购物</option>
                        <option value="other">其他</option>
                    </select>
                </div>
            </div>
            <div id="done-list" class="todo-list-container"></div>
        </div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div id="edit-modal-overlay" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">编辑待办事项</div>
            <button class="modal-close" id="edit-modal-close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-row">
                <label for="edit-category">分类</label>
                <select id="edit-category" data-ui-select="single">
                    <option value="work">工作</option>
                    <option value="study">学习</option>
                    <option value="organize">整理</option>
                    <option value="life">生活</option>
                    <option value="shopping">购物</option>
                    <option value="other">其他</option>
                </select>
            </div>
            <div class="modal-row">
                <label for="edit-content">内容</label>
                <textarea id="edit-content"></textarea>
            </div>
            <div class="modal-row">
                <label for="edit-due">预计完成时间</label>
                <input type="datetime-local" id="edit-due" />
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn" id="edit-modal-cancel">取消</button>
            <button class="btn primary" id="edit-modal-save">保存</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script src="/static/theme-switcher.js"></script>
<script src="/static/ui-select.js"></script>
<script src="/static/todos.js"></script>
</body>
</html>
