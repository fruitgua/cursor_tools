<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 工作小助手</title>
    <link rel="icon" type="image/png" href="/static/frog.png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body class="home-page">
<div class="app-container">
    <header class="app-header app-header-with-action">
        <div class="app-header-left">
        <div class="header-title-row">
            <h1>呱呱的壮团助手</h1>
            <img src="/static/frog.png" alt="" class="frog-img frog-header" aria-hidden="true">
        </div>
        </div>
        <div class="header-actions">
            <div id="theme-switcher-container"></div>
        </div>
    </header>

    <main class="home-main">
        <div class="home-content">
            <p class="home-intro">我是你的工作小助手，你可以不断完善我的能力。</p>
        <section class="home-grid">
            <button class="home-card" data-key="calendar">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">📅</div>
                <div class="home-card-title">日程管理</div>
                <div class="home-card-desc">每日日程管理与记录，养成良好习惯。</div>
            </button>
            <button class="home-card" data-key="checkin">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">🗓️</div>
                <div class="home-card-title">事件与待办</div>
                <div class="home-card-desc">提醒、打卡、日历标签、待办事项管理。</div>
            </button>
            <button class="home-card" data-key="address-helper">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">📚</div>
                <div class="home-card-title">单词本</div>
                <div class="home-card-desc">不积跬步，无以至千里；不积小流，无以成江海。</div>
            </button>
            <button class="home-card" data-key="ledger">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">💰</div>
                <div class="home-card-title">记账本</div>
                <div class="home-card-desc">记录日常收支，好好生活。</div>
            </button>
            <button class="home-card" data-key="notes">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">📝</div>
                <div class="home-card-title">学习笔记</div>
                <div class="home-card-desc">业精于勤，荒于嬉；行成于思，毁于随。</div>
            </button>
            <button class="home-card" data-key="diary">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">📓</div>
                <div class="home-card-title">日记</div>
                <div class="home-card-desc">每日一篇，记录所思所想</div>
            </button>
            <button class="home-card" data-key="bookmarks">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">🔖</div>
                <div class="home-card-title">常用书签</div>
                <div class="home-card-desc">管理常用的学习网站</div>
            </button>
            <button class="home-card" data-key="file-manager">
                <img src="/static/frog.png" alt="" class="frog-img frog-card" aria-hidden="true">
                <div class="home-card-icon">📁</div>
                <div class="home-card-title">本地文件管理工具</div>
                <div class="home-card-desc">扫描并分类展示本地文件夹，支持编辑和删除</div>
            </button>

        </section>
        </div>
    </main>

    <footer class="app-footer">
        <p>
            当前访问IP数：{{ ip_count | default(0) }} ，
            <a href="/ip-monitor">查看访问记录</a>
        </p>
        <p class="home-lan-hint home-lan-row">
            <span class="home-lan-label">本地访问地址：</span>
            <code id="home-current-origin" class="home-origin-code"></code>
            <button type="button" class="btn home-copy-btn" id="btn-copy-origin">复制</button>
            <button type="button" class="btn home-copy-btn" id="btn-fetch-lan">获取局域网 IP 并生成链接</button>
            <span id="home-lan-wrap" class="home-lan-wrap" hidden>
                <code id="home-lan-url" class="home-origin-code"></code>
                <button type="button" class="btn home-copy-btn" id="btn-copy-lan">复制链接</button>
            </span>
        </p>
    </footer>
</div>

<div id="toast-container"></div>

<script src="/static/theme-switcher.js"></script>
<script src="/static/home.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        var el = document.getElementById("home-current-origin");
        if (el) el.textContent = window.location.origin || "";
        var btn = document.getElementById("btn-copy-origin");
        if (btn) {
            btn.addEventListener("click", function () {
                var t = window.location.origin || "";
                if (!t) return;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(t).then(function () {
                        if (typeof showHomeToast === "function") showHomeToast("已复制当前入口地址");
                    }).catch(function () {
                        if (typeof showHomeToast === "function") showHomeToast("复制失败，请手动选择复制");
                    });
                } else if (typeof showHomeToast === "function") {
                    showHomeToast("浏览器不支持一键复制，请手动复制地址栏");
                }
            });
        }
        var fetchLan = document.getElementById("btn-fetch-lan");
        if (fetchLan) {
            fetchLan.addEventListener("click", function () {
                fetchLan.disabled = true;
                fetch("/api/network-access-hint")
                    .then(function (r) { return r.json(); })
                    .then(function (j) {
                        fetchLan.disabled = false;
                        if (!j || !j.success) {
                            if (typeof showHomeToast === "function") {
                                showHomeToast((j && j.message) || "获取失败");
                            }
                            return;
                        }
                        var wrap = document.getElementById("home-lan-wrap");
                        var urlEl = document.getElementById("home-lan-url");
                        if (urlEl) urlEl.textContent = j.home_url || "";
                        if (wrap) wrap.removeAttribute("hidden");
                        if (typeof showHomeToast === "function") {
                            showHomeToast("已生成局域网访问链接（IP：" + (j.lan_ip || "") + "）");
                        }
                    })
                    .catch(function () {
                        fetchLan.disabled = false;
                        if (typeof showHomeToast === "function") showHomeToast("请求失败，请稍后重试");
                    });
            });
        }
        var copyLan = document.getElementById("btn-copy-lan");
        if (copyLan) {
            copyLan.addEventListener("click", function () {
                var urlEl = document.getElementById("home-lan-url");
                var t = urlEl ? (urlEl.textContent || "").trim() : "";
                if (!t) return;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(t).then(function () {
                        if (typeof showHomeToast === "function") showHomeToast("已复制局域网访问链接");
                    }).catch(function () {
                        if (typeof showHomeToast === "function") showHomeToast("复制失败，请手动选择复制");
                    });
                } else if (typeof showHomeToast === "function") {
                    showHomeToast("浏览器不支持一键复制，请手动复制");
                }
            });
        }
    });
</script>
</body>
</html>
