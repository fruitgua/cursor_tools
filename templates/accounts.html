<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/frog.png">
    <title>常用账号 - 工作小助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="app-container">
    <header class="app-header app-header-with-action">
        <div class="app-header-left">
            <h1>常用账号</h1>
        </div>
        <div class="header-actions">
            <div id="theme-switcher-container"></div>
            <button id="btn-go-home" class="btn">返回首页</button>
        </div>
    </header>

    <section class="control-panel accounts-add-panel">
        <div class="control-row accounts-add-row-1">
            <div class="field-group">
                <select id="add-account-type" class="field-control accounts-type-select" data-ui-select="single">
                    <option value="system" selected>系统</option>
                    <option value="tool">工具</option>
                </select>
            </div>
            <div class="field-group">
                <input type="text" id="add-system" class="field-control" placeholder="如：GitHub" />
            </div>
            <div class="field-group">
                <input type="text" id="add-url" class="field-control" placeholder="如：https://github.com" />
            </div>
            <div class="field-group">
                <input type="text" id="add-account-info" class="field-control" placeholder="如：用户名/密码" />
            </div>
            <button id="btn-add" class="btn primary">添加</button>
        </div>
    </section>

    <section class="control-panel accounts-filter-panel">
        <div class="control-row accounts-filter-row">
            <div class="field-group">
                <span class="field-label">类型</span>
                <select id="accounts-filter-type" class="field-control accounts-type-select" data-ui-select="single">
                    <option value="">全部</option>
                    <option value="system" selected>系统</option>
                    <option value="tool">工具</option>
                </select>
            </div>
        </div>
    </section>

    <section class="table-section accounts-table-section">
        <table class="file-table accounts-table">
            <thead>
            <tr>
                <th>类型</th>
                <th>系统</th>
                <th>网址</th>
                <th>账号信息</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="accounts-tbody">
            <tr>
                <td colspan="5" class="placeholder">暂无数据，请点击上方"添加"录入。</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>

<div id="toast-container"></div>

<!-- 全局确认弹窗：删除常用账号 -->
<div id="accounts-confirm-modal" class="ui-modal-overlay hidden" role="dialog" aria-modal="true" aria-label="操作提示">
    <div class="ui-modal">
        <div class="ui-modal-header">
            <div class="ui-modal-title">操作提示</div>
        </div>
        <div class="ui-modal-body">
            <div class="ui-modal-body-text">是否确认删除当前数据？</div>
        </div>
        <div class="ui-modal-actions">
            <button type="button" class="btn btn-ghost" id="btn-accounts-delete-cancel">取消</button>
            <button type="button" class="btn primary" id="btn-accounts-delete-confirm">确认</button>
        </div>
    </div>
</div>

<script src="/static/theme-switcher.js"></script>
<script src="/static/ui-select.js"></script>
<script src="/static/accounts.js"></script>
</body>
</html>
