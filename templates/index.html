<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/static/frog.png">
    <title>本地文件管理工具</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css">
</head>
<body>
<div class="app-container">
    <header class="app-header app-header-with-action">
        <div class="app-header-left">
            <h1>本地文件管理工具</h1>
        </div>
        <div class="header-actions">
            <div id="theme-switcher-container"></div>
            <button id="btn-go-home" class="btn">返回首页</button>
        </div>
    </header>

    <section class="control-panel">
        <div class="control-row control-row-top">
            <div class="field-group path-group">
                <span class="field-label required-label">文件夹路径</span>
                <input id="selected-dir" class="selected-dir field-control" value="/Users/a53828/Documents" />
                <button id="btn-scan" class="btn primary">扫描文件</button>
                <div id="status-message" class="status-message"></div>
            </div>
        </div>
        <div class="control-row control-row-filters">
            <div class="field-group">
                <span class="field-label">文件类型</span>
                <select id="filter-type" class="field-control" data-ui-select="single">
                    <option value="">全部文件类型</option>
                    <option value="word">Word</option>
                    <option value="excel">Excel</option>
                    <option value="ppt">PPT</option>
                    <option value="pdf">PDF</option>
                    <option value="prototype">原型</option>
                    <option value="prototype_component">原型元件</option>
                    <option value="hidden">隐藏文件</option>
                </select>
            </div>
            <div class="field-group">
                <span class="field-label">文件名称</span>
                <input type="text" id="search-keyword" class="field-control" placeholder="请输入关键字" />
            </div>
        </div>
    </section>

    <section class="tab-section">
        <div class="tab-row">
            <button id="tab-files" class="tab-btn active" type="button" data-tab="files">文件列表</button>
            <button id="tab-similar" class="tab-btn" type="button" data-tab="similar">疑似同文件处理</button>
        </div>
    </section>

    <section id="panel-files" class="tab-panel active">
        <section class="table-section">
            <table class="file-table">
                <thead>
                <tr>
                    <th data-sort="name">文件名称<span class="sort-indicator"></span></th>
                    <th data-sort="size">文件大小<span class="sort-indicator"></span></th>
                    <th data-sort="extension">扩展名<span class="sort-indicator"></span></th>
                    <th>备注 (输入后回车即可保存)</th>
                    <th data-sort="created_at">创建时间<span class="sort-indicator"></span></th>
                    <th data-sort="modified_at">最后修改时间<span class="sort-indicator"></span></th>
                    <th>文件夹地址</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="file-table-body">
                <tr>
                    <td colspan="8" class="placeholder">请先选择目录并点击"扫描文件"。</td>
                </tr>
                </tbody>
            </table>
        </section>

        <section class="pagination-section">
            <div id="pagination-info" class="pagination-info"></div>
            <div class="pagination-controls">
                <button id="btn-prev-page" class="btn" disabled>上一页</button>
                <span id="pagination-page-detail"></span>
                <button id="btn-next-page" class="btn" disabled>下一页</button>
            </div>
        </section>
    </section>

    <section id="panel-similar" class="tab-panel hidden">
        <section id="similar-groups-container" class="similar-groups-container">
            <div class="placeholder">请先扫描文件，然后切换到“疑似同文件处理”查看结果。</div>
        </section>
        <section class="pagination-section similar-pagination-section">
            <div class="similar-pagination-left">
                <div id="similar-summary" class="pagination-info">共 0 组，0 个文件</div>
                <div id="similar-pagination-info" class="pagination-info"></div>
            </div>
            <div class="pagination-controls">
                <button id="btn-similar-prev-page" class="btn" disabled>上一页</button>
                <span id="similar-pagination-page-detail"></span>
                <button id="btn-similar-next-page" class="btn" disabled>下一页</button>
            </div>
        </section>
    </section>

    <footer class="app-footer">
        <p>提示：本工具在本机浏览器中运行，扫描本地磁盘。选择目录时请使用绝对路径，例如：
            <code>/Users/你的用户名/Documents</code></p>
    </footer>
</div>

<div id="toast-container"></div>

<!-- 全局 Loading 弹窗：扫描文件 -->
<div id="scan-loading-modal" class="ui-modal-overlay hidden" role="dialog" aria-modal="true" aria-label="操作提示">
    <div class="ui-modal ui-modal--loading">
        <div class="ui-modal-header">
            <div class="ui-modal-title">操作提示</div>
        </div>
        <div class="ui-modal-body">
            <div class="ui-modal-body-row">
                <div class="ui-modal-spinner" aria-hidden="true"></div>
                <div class="ui-modal-body-text">正在扫描文件，请稍候…</div>
            </div>
        </div>
    </div>
</div>

<!-- 全局确认弹窗：删除文件 -->
<div id="file-delete-confirm-modal" class="ui-modal-overlay hidden" role="dialog" aria-modal="true" aria-label="操作提示">
    <div class="ui-modal">
        <div class="ui-modal-header">
            <div class="ui-modal-title">操作提示</div>
        </div>
        <div class="ui-modal-body">
            <div class="ui-modal-body-text">是否确认删除当前文件？</div>
        </div>
        <div class="ui-modal-actions">
            <button type="button" class="btn btn-ghost" id="btn-file-delete-cancel">取消</button>
            <button type="button" class="btn primary" id="btn-file-delete-confirm">确认</button>
        </div>
    </div>
</div>

<script src="/static/theme-switcher.js"></script>
<script src="/static/ui-select.js"></script>
<script src="/static/main.js"></script>
</body>
</html>
