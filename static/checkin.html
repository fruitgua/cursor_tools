<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#409EFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="每日打卡">
    <title>每日打卡 - 工作小助手</title>
    <link rel="icon" type="image/png" href="/static/frog.png">
    <link rel="manifest" href="/static/checkin-manifest.json">
    <link rel="apple-touch-icon" href="/static/checkin-icon.svg">
    <link rel="stylesheet" href="/static/style.css?v=20260323142431">
    <link rel="stylesheet" href="/static/theme.css?v=20260323142431">
    <link rel="stylesheet" href="/static/checkin.css?v=20260323142431">
</head>
<body>
<div id="app" class="app">
    <div class="nav-row">
        <div class="nav-tabs">
            <button type="button" class="nav-tab active" data-page="events">事件管理</button>
            <button type="button" class="nav-tab" data-page="stats">事件统计</button>
            <button type="button" class="nav-tab" data-page="todos">待办事项</button>
        </div>
        <div class="header-actions">
            <div id="theme-switcher-container" class="header-action-extra"></div>
            <button type="button" class="btn btn-go-home" id="btn-go-home" title="返回首页" aria-label="返回首页"><span class="btn-go-home-icon" aria-hidden="true">⌂</span><span class="btn-go-home-text">返回首页</span></button>
        </div>
    </div>

    <!-- Page: Stats -->
    <div id="page-stats" class="page">
        <div class="stats-layout">
            <div class="card stats-left-card">
                <h3 class="card-title">打卡事件</h3>
                <div class="stats-event-list" id="stats-event-list">
                    <p class="empty-state">暂无打卡事件，请先在事件管理中添加</p>
                </div>
            </div>
            <div class="card stats-right-card">
                <h3 class="card-title">统计详情</h3>
                <div class="stats-detail" id="stats-detail">
                    <p class="empty-state">请选择左侧打卡事件</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Page: Events -->
    <div id="page-events" class="page active">
        <div class="event-type-tabs-wrap">
            <div class="event-type-tabs">
                <button type="button" class="event-type-tab active" data-type="checkin">打卡</button>
                <button type="button" class="event-type-tab" data-type="reminder">提醒</button>
                <button type="button" class="event-type-tab" data-type="labels">日期标签</button>
                <button type="button" class="event-type-tab" data-type="caldav">同步配置</button>
            </div>
        </div>

        <div id="event-form-checkin" class="event-form-checkin card">
            <h3 class="card-title">新增打卡</h3>
            <div class="event-form-checkin-row">
                <div class="event-form-field">
                    <input type="text" id="checkin-name" placeholder="事件名称">
                </div>
                <div class="event-form-field event-form-field-color">
                    <div class="event-form-color-inputs">
                        <div class="color-swatch-preview" id="checkin-color-preview" style="--swatch-color: #4CAF50" title="颜色预览"></div>
                        <input type="text" id="checkin-color-hex" placeholder="#ffffff" value="#4CAF50">
                    </div>
                </div>
                <div class="event-form-field">
                    <input type="date" id="checkin-date-start" required>
                </div>
                <div class="event-form-field">
                    <input type="date" id="checkin-date-end" required>
                </div>
                <button type="button" class="btn primary" id="btn-add-checkin">添加</button>
            </div>
        </div>

        <div id="event-form-reminder" class="event-form-reminder card" style="display:none">
            <h3 class="card-title">新增提醒</h3>
            <div class="event-form-checkin-row event-form-reminder-row">
                <div class="event-form-field event-form-field-type">
                    <div class="event-form-type-with-icon">
                        <span id="reminder-type-icon" class="reminder-type-icon" aria-hidden="true">🔔</span>
                        <select id="reminder-type" class="event-form-select" data-ui-select="single">
                            <option value="payment">生活缴费</option>
                            <option value="bill">银行账单</option>
                            <option value="activity">活动/演出</option>
                            <option value="sale">开售抢购</option>
                            <option value="party">聚会</option>
                            <option value="work">工作</option>
                            <option value="normal" selected>普通</option>
                        </select>
                    </div>
                </div>
                <div class="event-form-field">
                    <input type="text" id="reminder-name" placeholder="事件名称">
                </div>
                <div class="event-form-field">
                    <select id="reminder-date-type" class="event-form-select" data-ui-select="single">
                        <option value="specific" selected>指定日期</option>
                        <option value="monthly">每月</option>
                    </select>
                </div>
                <div id="reminder-specific-fields" class="event-form-field-group">
                    <div class="event-form-field">
                        <input type="date" id="reminder-specific-date">
                    </div>
                    <div class="event-form-field event-form-field-time">
                        <div class="event-form-time-inputs">
                            <input type="number" id="reminder-hour" min="0" max="23" placeholder="时">
                            <span>:</span>
                            <input type="number" id="reminder-minute" min="0" max="59" placeholder="分">
                        </div>
                    </div>
                </div>
                <div id="reminder-monthly-fields" class="event-form-field-group" style="display:none">
                    <div class="event-form-field event-form-field-day-unit">
                        <input type="number" id="reminder-day-of-month" min="1" max="31" placeholder="几号">
                        <span class="field-unit">号</span>
                    </div>
                    <div class="event-form-field">
                        <input type="date" id="reminder-monthly-start" placeholder="生效开始日期">
                    </div>
                    <div class="event-form-field">
                        <input type="date" id="reminder-monthly-end" placeholder="生效结束日期">
                    </div>
                </div>
                <button type="button" class="btn primary" id="btn-add-reminder">添加</button>
            </div>
        </div>

        <div id="event-form-labels" class="event-form-labels card" style="display:none">
            <h3 class="card-title">新增日期标签</h3>
            <div class="event-form-checkin-row event-form-labels-row">
                <div class="event-form-field">
                    <select id="label-type" class="event-form-select" data-ui-select="single">
                        <option value="annual" selected>每年固定日期</option>
                        <option value="specific">指定日期</option>
                    </select>
                </div>
                <div id="label-specific-fields" class="event-form-field-group" style="display:none">
                    <div class="event-form-field">
                        <input type="date" id="label-date">
                    </div>
                </div>
                <div id="label-annual-fields" class="event-form-field-group">
                    <div class="event-form-field event-form-field-label-md">
                        <select id="label-month" class="event-form-select" data-ui-select="single" aria-label="月">
                            <option value="">月</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                        </select>
                    </div>
                    <div class="event-form-field event-form-field-label-md">
                        <select id="label-day" class="event-form-select" data-ui-select="single" aria-label="日">
                            <option value="">日</option>
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                            <option value="6">6</option>
                            <option value="7">7</option>
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                            <option value="14">14</option>
                            <option value="15">15</option>
                            <option value="16">16</option>
                            <option value="17">17</option>
                            <option value="18">18</option>
                            <option value="19">19</option>
                            <option value="20">20</option>
                            <option value="21">21</option>
                            <option value="22">22</option>
                            <option value="23">23</option>
                            <option value="24">24</option>
                            <option value="25">25</option>
                            <option value="26">26</option>
                            <option value="27">27</option>
                            <option value="28">28</option>
                            <option value="29">29</option>
                            <option value="30">30</option>
                            <option value="31">31</option>
                        </select>
                    </div>
                </div>
                <div class="event-form-field">
                    <input type="text" id="label-name" placeholder="如：国庆节">
                </div>
                <div id="label-annual-range-fields" class="event-form-field-group" style="display:none">
                    <div class="event-form-field">
                        <input type="date" id="label-annual-start" placeholder="生效开始日期">
                    </div>
                    <div class="event-form-field">
                        <input type="date" id="label-annual-end" placeholder="生效结束日期">
                    </div>
                </div>
                <div class="event-form-field event-form-field-actions">
                    <div class="event-form-field-actions-btns">
                        <button type="button" class="btn primary" id="btn-add-label">添加</button>
                        <button type="button" class="btn btn-ghost" id="btn-fetch-holidays">获取中国节假日</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card event-list-card" id="event-list-card">
            <div class="event-list-header">
                <h3 class="card-title" id="event-list-title">打卡列表</h3>
                <div class="event-list-filters inline-fields-gap">
                    <select id="reminder-type-filter" class="event-form-select reminder-type-filter" style="display:none" title="按类型筛选" data-ui-select="single">
                        <option value="">全部提醒类型</option>
                        <option value="payment">生活缴费</option>
                        <option value="bill">银行账单</option>
                        <option value="activity">活动/演出</option>
                        <option value="sale">开售抢购</option>
                        <option value="party">聚会</option>
                        <option value="work">工作</option>
                        <option value="normal">普通</option>
                    </select>
                    <select id="reminder-validity-filter" class="event-form-select reminder-validity-filter" style="display:none" title="有效/过期" data-ui-select="single">
                        <option value="valid" selected>有效</option>
                        <option value="expired">过期</option>
                    </select>
                    <select id="date-label-filter" class="event-form-select date-label-filter" style="display:none" title="同步/自定义" data-ui-select="single">
                        <option value="custom" selected>自定义</option>
                        <option value="sync">同步</option>
                    </select>
                </div>
            </div>
            <div class="event-list" id="event-list">
                <p class="empty-state">暂无打卡事件，请先添加</p>
            </div>
        </div>

        <!-- CalDAV Sync Panel -->
        <div id="event-sync-panel" class="card" style="margin-top:16px; display:none;">
            <h3 class="card-title">日历同步（CalDAV）</h3>
            <div class="event-form-field-group" style="display:block; margin-top:12px;">
                <div class="event-form-field">
                    <input type="text" id="caldav-url" class="field-control" placeholder="CalDAV 根地址（DAV URL）" />
                </div>
                <div class="event-form-field">
                    <input type="text" id="caldav-calendar-url" class="field-control" placeholder="目标日历集合 URL（Calendar Collection）" />
                </div>
                <div class="event-form-field" style="display:flex; gap:12px;">
                    <input type="text" id="caldav-username" class="field-control" placeholder="用户名" />
                </div>
                <div class="event-form-field">
                    <input type="password" id="caldav-password" class="field-control" placeholder="密码 / 应用密码" />
                </div>
            </div>
            <div class="event-form-field event-form-field-actions" style="margin-top:12px;">
                <div class="event-form-field-actions-btns">
                    <button type="button" class="btn primary" id="btn-caldav-save-sync">保存并同步</button>
                    <button type="button" class="btn btn-ghost" id="btn-caldav-sync-now">立即同步</button>
                </div>
            </div>
            <p class="add-event-hint" style="margin-top:8px; margin-bottom:0;">
                同步间隔：每小时（单向写入）。需要先配置 CalDAV。
            </p>
        </div>
    </div>

    <!-- Page: Todos（复用“待办事项”页面，过渡期） -->
    <div id="page-todos" class="page">
        <style>
            /* 仅作用于待办 Tab：避免影响其它 Tab 的 control-panel 等通用类 */
            /* 不用 overflow:auto：会裁切/叠层导致新增区分类下拉被下方列表盖住；列表区各自 overflow-y:auto */
            #app #page-todos.page.active { display: flex !important; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: visible; }
            #page-todos .control-panel {
                padding: 12px 10px 8px;
                position: relative;
                z-index: 40;
            }
            /*
             * 打卡主题给 .control-panel 加了 backdrop-filter 时，会为内部 position:fixed 建立新的包含块，
             * ui-select.js 用 getBoundingClientRect 写的视口坐标会错位，面板飘到页面中部。
             * 仅待办 Tab 顶部条关闭毛玻璃，半透明底仍由 theme 的 background 提供。
             */
            html[data-theme="checkin"] #page-todos .control-panel {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
            }
            #page-todos .control-panel .control-row { gap: 10px; align-items: flex-end; }
            #page-todos .control-panel .field-group { margin-right: 0; gap: 10px; }
            #page-todos .control-panel .field-control { height: 36px; box-sizing: border-box; }
            #page-todos #btn-add-todo { height: 36px; box-sizing: border-box; }

            /* 新增待办：分类下拉（无文案标签，与其它字段一致） */
            #page-todos .todo-add-field-category {
                display: flex;
                flex-direction: row;
                align-items: flex-end;
                flex-shrink: 0;
                min-width: 120px;
                max-width: 200px;
            }
            #page-todos .todo-add-field-category .field-control,
            #page-todos .todo-add-field-category .select-combobox {
                width: 100%;
                min-width: 0;
                max-width: 100%;
            }
            #page-todos .todo-add-field-category .select-combobox > .select-trigger.field-control {
                min-width: 0;
                width: 100%;
            }
            #page-todos .todo-add-field-category .select-combobox,
            #page-todos .todo-done-filter-only .select-combobox {
                overflow: visible;
            }
            #page-todos .todo-add-field-category .select-panel,
            #page-todos .todo-done-filter-only .select-panel {
                z-index: 500;
            }

            #page-todos .todo-main-layout {
                display: flex;
                gap: 16px;
                flex: 1;
                min-height: 0;
                margin-top: 8px;
                position: relative;
                z-index: 1;
            }
            #page-todos .todo-column { flex: 1 1 50%; min-width: 0; display: flex; flex-direction: column; }
            #page-todos .todo-column-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; min-height: 44px; padding-left: 12px; padding-right: 12px; box-sizing: border-box; gap: 12px; }
            #page-todos .todo-column-header .field-group { margin-right: 0; }
            #page-todos .todo-column-title { font-size: 16px; font-weight: 600; color: #111827; flex-shrink: 0; }
            /* 已完成：标题与分类筛选同排，仅控件、无文案标签，居右 */
            #page-todos .todo-column-done .todo-done-filter-only {
                margin-left: auto;
                flex: 0 0 auto;
                min-width: 140px;
                max-width: 220px;
            }
            #page-todos .todo-column-done .todo-done-filter-only .field-control,
            #page-todos .todo-column-done .todo-done-filter-only .select-combobox {
                width: 100%;
                min-width: 0;
            }
            #page-todos .todo-column-done .todo-done-filter-only .select-combobox > .select-trigger.field-control {
                min-width: 0;
                width: 100%;
            }
            #page-todos .todo-list-container { flex: 1; min-height: 0; background-color: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08); padding: 12px 12px 8px; overflow-y: auto; }

            /* 卡片样式（复制自待办事项页面样式，并做作用域隔离） */
            #page-todos .todo-card {
                position: relative;
                padding: 12px 12px 10px;
                border-radius: 8px;
                background-color: #ffffff;
                box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
                border: 1px solid #e5e7eb;
                margin-bottom: 10px;
                transition: box-shadow 0.15s, transform 0.05s, border-color 0.15s, background-color 0.15s;
            }
            #page-todos .todo-card:hover {
                box-shadow: 0 2px 8px rgba(15, 23, 42, 0.16);
                transform: translateY(-1px);
                border-color: #93c5fd;
            }
            #page-todos .todo-card-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 6px;
                flex-wrap: wrap;
            }
            #page-todos .todo-card-header-left {
                display: flex;
                align-items: center;
                gap: 8px;
                flex: 1;
                min-width: 0;
                flex-wrap: wrap;
            }
            #page-todos .todo-checkbox {
                width: 16px;
                height: 16px;
                cursor: pointer;
            }
            #page-todos .category-badge {
                display: inline-flex;
                align-items: center;
                padding: 2px 8px;
                border-radius: 999px;
                font-size: 12px;
                font-weight: 500;
                color: #fff;
                white-space: nowrap;
            }
            #page-todos .badge-work { background-color: #2563eb; }
            #page-todos .badge-study { background-color: #7c3aed; }
            #page-todos .badge-life { background-color: #16a34a; }
            #page-todos .badge-shopping { background-color: #f97316; }
            #page-todos .badge-other { background-color: #6b7280; }
            #page-todos .todo-card-content {
                font-size: 14px;
                color: #111827;
                line-height: 1.6;
                word-break: break-word;
                margin-left: 24px;
            }
            #page-todos .todo-meta {
                margin-top: 4px;
                font-size: 11px;
                color: #9ca3af;
            }
            #page-todos .card-actions {
                position: absolute;
                top: 6px;
                right: 8px;
                display: flex;
                gap: 6px;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.15s;
            }
            #page-todos .todo-card:hover .card-actions {
                opacity: 1;
                pointer-events: auto;
            }
            #page-todos .card-action-btn {
                padding: 2px 8px;
                font-size: 12px;
                border-radius: 999px;
                border: 1px solid transparent;
                background: rgba(17, 24, 39, 0.02);
                color: #374151;
                cursor: pointer;
            }
            #page-todos .card-action-btn:hover {
                background: rgba(37, 99, 235, 0.06);
                border-color: rgba(37, 99, 235, 0.4);
            }
            #page-todos .card-action-btn.delete { color: #b91c1c; }
            #page-todos .card-action-btn.delete:hover {
                background: rgba(220, 38, 38, 0.06);
                border-color: rgba(220, 38, 38, 0.4);
            }
            #page-todos .empty-state {
                font-size: 13px;
                color: #9ca3af;
                text-align: center;
                padding: 24px 12px;
            }
            #page-todos .done-item {
                padding: 10px 10px 8px;
                border-radius: 6px;
                border: 1px solid #e5e7eb;
                margin-bottom: 8px;
                background-color: #f9fafb;
                font-size: 13px;
                line-height: 1.5;
            }
            #page-todos .done-top {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 4px;
                gap: 8px;
                flex-wrap: wrap;
            }
            #page-todos .done-top-left {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                flex: 1;
                min-width: 0;
                flex-wrap: wrap;
            }
            #page-todos .done-content { color: #111827; word-break: break-word; }
            #page-todos .done-date { font-size: 11px; color: #9ca3af; }
            #page-todos .todo-edit-grid { display: flex; flex-direction: column; gap: 12px; }
            #page-todos .todo-edit-row-two { display: flex; gap: 8px; align-items: flex-start; }
            #page-todos .todo-edit-field { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
            #page-todos .todo-edit-field label { font-size: 13px; color: #374151; }
            #page-todos .todo-edit-field .field-control { width: 100%; height: 36px; box-sizing: border-box; }
            #page-todos #edit-content.field-control { height: 160px; resize: vertical; }

            #page-todos #new-category,
            #page-todos #done-filter,
            #page-todos #edit-category {
                background-color: #ffffff;
            }

            /* H5：保持与原待办页一致（右侧已完成列隐藏） */
            @media (max-width: 720px) {
                #page-todos .todo-column-done { display: none !important; }
            }
        </style>

        <!-- 顶部新增待办表单（复制自待办事项页面） -->
        <section class="control-panel">
            <div class="control-row">
                <div class="field-group">
                    <input id="new-due" type="datetime-local" class="field-control" style="min-width: 220px;" title="提醒时间" />
                </div>
                <div class="field-group todo-add-field-category">
                    <select id="new-category" class="field-control" data-ui-select="single" aria-label="分类">
                        <option value="work">工作</option>
                        <option value="study">学习</option>
                        <option value="organize">整理</option>
                        <option value="life">生活</option>
                        <option value="shopping">购物</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="field-group" style="flex:1; min-width: 260px;">
                    <input id="new-content" type="text" class="field-control" style="flex:1; min-width: 200px;"
                           placeholder="请输入待办内容" />
                </div>
                <button id="btn-add-todo" class="btn primary">添加待办</button>
            </div>
        </section>

        <!-- 主体左右区域（复制自待办事项页面） -->
        <div class="todo-main-layout">
            <div class="todo-column">
                <div class="todo-column-header">
                    <div class="todo-column-title">待办事项</div>
                </div>
                <div id="todo-list" class="todo-list-container"></div>
            </div>

            <div class="todo-column todo-column-done">
                <div class="todo-column-header">
                    <div class="todo-column-title">已完成</div>
                    <div class="todo-done-filter-only">
                        <select id="done-filter" class="field-control" data-ui-select="single" aria-label="按分类筛选已完成">
                            <option value="all">不限</option>
                            <option value="work">工作</option>
                            <option value="study">学习</option>
                            <option value="organize">整理</option>
                            <option value="life">生活</option>
                            <option value="shopping">购物</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                </div>
                <div id="done-list" class="todo-list-container"></div>
            </div>
        </div>

        <!-- 编辑弹窗（复制自待办事项页面） -->
        <div id="edit-modal-overlay" class="ui-input-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
            <div class="ui-input-modal">
                <div class="ui-input-modal-header">
                    <div class="ui-input-modal-title" id="edit-modal-title">编辑待办</div>
                </div>
                <div class="ui-input-modal-body">
                    <div class="todo-edit-grid">
                        <div class="todo-edit-row-two">
                            <div class="todo-edit-field">
                                <label for="edit-category">分类</label>
                                <select id="edit-category" class="field-control" data-ui-select="single">
                                    <option value="work">工作</option>
                                    <option value="study">学习</option>
                                    <option value="organize">整理</option>
                                    <option value="life">生活</option>
                                    <option value="shopping">购物</option>
                                    <option value="other">其他</option>
                                </select>
                            </div>
                            <div class="todo-edit-field">
                                <label for="edit-due">预计完成时间</label>
                                <input type="datetime-local" id="edit-due" class="field-control" />
                            </div>
                        </div>
                        <div class="todo-edit-field">
                            <label for="edit-content">内容</label>
                            <textarea id="edit-content" class="field-control"></textarea>
                        </div>
                    </div>
                </div>
                <div class="ui-input-modal-actions">
                    <button class="btn btn-ghost" id="edit-modal-cancel">取消</button>
                    <button class="btn primary" id="edit-modal-save">保存</button>
                </div>
            </div>
        </div>

        <div id="toast-container"></div>

        <!-- UI 规范：确认弹窗（删除待办确认） -->
        <div id="todos-confirm-modal" class="ui-modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="todos-confirm-title">
            <div class="ui-modal">
                <div class="ui-modal-header">
                    <div class="ui-modal-title" id="todos-confirm-title">操作提示</div>
                </div>
                <div class="ui-modal-body">
                    <p class="ui-modal-body-text" id="todos-confirm-text"></p>
                </div>
                <div class="ui-modal-actions">
                    <button type="button" class="btn btn-ghost" id="todos-confirm-cancel">取消</button>
                    <button type="button" class="btn primary" id="todos-confirm-ok">确认</button>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Modal: Edit Event (checkin) -->
<div id="edit-event-modal" class="modal-overlay hidden">
    <div class="modal">
        <h3 class="modal-title">编辑打卡</h3>
        <div class="form-row">
            <label>事件名称</label>
            <input type="text" id="edit-checkin-name">
        </div>
        <div class="form-row">
            <label>颜色</label>
            <div class="event-form-color-inputs">
                <div class="color-swatch-preview" id="edit-checkin-color-preview" style="--swatch-color: #4CAF50" title="颜色预览"></div>
                <input type="text" id="edit-checkin-color-hex" placeholder="#ffffff" style="width:100px">
            </div>
        </div>
        <div class="form-row">
            <label>开始日期</label>
            <input type="date" id="edit-checkin-date-start">
        </div>
        <div class="form-row">
            <label>结束日期</label>
            <input type="date" id="edit-checkin-date-end">
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-ghost" id="btn-edit-event-cancel">取消</button>
            <button type="button" class="btn primary" id="btn-edit-event-save">保存</button>
        </div>
    </div>
</div>

<!-- Modal: Edit Reminder -->
<div id="edit-reminder-modal" class="modal-overlay hidden">
    <div class="modal">
        <h3 class="modal-title">编辑提醒</h3>
        <div class="form-row">
            <label>类型</label>
            <div class="event-form-type-with-icon">
                <span id="edit-reminder-type-icon" class="reminder-type-icon" aria-hidden="true">🔔</span>
                <select id="edit-reminder-type" class="event-form-select" data-ui-select="single">
                    <option value="payment">生活缴费</option>
                    <option value="bill">银行账单</option>
                    <option value="activity">活动/演出</option>
                    <option value="sale">开售抢购</option>
                    <option value="party">聚会</option>
                    <option value="work">工作</option>
                    <option value="normal">普通</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <label>事件名称</label>
            <input type="text" id="edit-reminder-name">
        </div>
        <div class="form-row">
            <label>日期类型</label>
            <select id="edit-reminder-date-type" class="event-form-select" data-ui-select="single">
                <option value="specific">指定日期</option>
                <option value="monthly">每月固定日期</option>
            </select>
        </div>
        <div id="edit-reminder-specific-fields">
            <div class="form-row">
                <label>日期</label>
                <input type="date" id="edit-reminder-specific-date">
            </div>
            <div class="form-row">
                <label>时间</label>
                <input type="number" id="edit-reminder-hour" min="0" max="23" style="width:60px">
                <span>:</span>
                <input type="number" id="edit-reminder-minute" min="0" max="59" style="width:60px">
            </div>
        </div>
        <div id="edit-reminder-monthly-fields" style="display:none">
            <div class="form-row">
                <label>每月几号</label>
                <div class="field-with-unit">
                    <input type="number" id="edit-reminder-day-of-month" min="1" max="31">
                    <span class="field-unit">号</span>
                </div>
            </div>
            <div class="form-row">
                <label>生效开始日期</label>
                <input type="date" id="edit-reminder-monthly-start">
            </div>
            <div class="form-row">
                <label>生效结束日期</label>
                <input type="date" id="edit-reminder-monthly-end">
            </div>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-ghost" id="btn-edit-reminder-cancel">取消</button>
            <button type="button" class="btn primary" id="btn-edit-reminder-save">保存</button>
        </div>
    </div>
</div>
