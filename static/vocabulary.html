<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/frog.png">
    <title>智能词汇本 - 工作小助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/theme.css">
    <link href="/static/quill/quill.snow.css" rel="stylesheet">
    <style>
        /* 词汇本专用样式 - 与主题配合 */
        .nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: nowrap; gap: 12px; }
        .nav-tabs { display: flex; gap: 16px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
        .nav-tab { padding: 8px 4px; border: none; background: transparent; color: #374151; font-size: 14px; cursor: pointer; border-radius: 0; border-bottom: 2px solid transparent; text-align: left; transition: color 0.15s, border-bottom-color 0.15s; white-space: nowrap; }
        .nav-tab:hover { color: #2563eb; }
        .nav-tab.active { color: #2563eb; font-weight: 500; border-bottom-color: #2563eb; }
        .vocab-page { display: flex; flex-direction: column; min-height: 0; flex: 1; padding: 0; overflow: visible; }
        .vocab-tabs-wrap { flex-shrink: 0; margin-bottom: 8px; }
        /* 三段式布局：外层容器负责高度分配，内部英文/中文 section 再做三段式滚动 */
        .vocab-scroll {
            flex: 1;
            min-height: 0;
            padding: 0 0 24px 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .vocab-page .control-panel { margin-top: 0; }
        .vocab-query-section { margin-bottom: 20px; }
        .vocab-query-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .vocab-query-row .field-control { flex: 1; min-width: 200px; }
        .vocab-result-card { margin-top: 12px; padding: 16px 20px 10px; border-radius: 8px; box-shadow: 0 1px 3px rgba(15,23,42,0.08); background: #fff; }
        .vocab-result-card .result-word { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .vocab-result-card .result-meaning { font-size: 14px; color: #374151; line-height: 1.6; white-space: pre-wrap; margin-bottom: 8px; }
        .vocab-actions { display: flex; gap: 8px; margin-top: 0; flex-wrap: wrap; }
        .vocab-query-row #btn-query,
        .vocab-query-row #btn-add-word,
        .vocab-query-row #btn-add-phrase {
            height: 36px;
            width: 100px;       /* 固定宽度，避免文字变化导致抖动 */
            box-sizing: border-box;
        }
        .vocab-search-section { margin: 0 0 16px; display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; min-width: 0; }
        /* 搜索框需要可收缩，避免窄屏下互相遮挡 */
        .vocab-search-section #search-english,
        .vocab-search-section #search-chinese { flex: 1 1 260px; min-width: 0; }
        /* 工具栏按钮组：与 UI 规范保持 12px 间距，且不换行 */
        .vocab-search-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; white-space: nowrap; }
        /* 英文单词本：类型下拉筛选（在分类标签左侧） */
        .vocab-type-filter { flex: 0 0 200px; min-width: 200px; flex-shrink: 0; }
        /* 分类标签下拉筛选（搜索栏左侧） */
        .vocab-tag-filter { flex: 0 0 200px; min-width: 200px; flex-shrink: 0; }
        .vocab-tag-combobox { position: relative; width: 100%; }
        .vocab-tag-filter-input { padding-right: 30px; width: 100%; min-width: 0; }
        .vocab-search-actions .btn {
            height: 36px;
            padding: 0 14px;
            box-sizing: border-box;
        }
        .vocab-tag-caret { position: absolute; right: 10px; top: 50%; width: 0; height: 0; transform: translateY(-35%); border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 6px solid #6b7280; pointer-events: none; }
        .vocab-tag-dropdown { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; box-shadow: 0 8px 20px rgba(15,23,42,0.12); z-index: 50; max-height: 240px; overflow: auto; }
        .vocab-tag-option { padding: 8px 10px; font-size: 14px; cursor: pointer; }
        .vocab-tag-option:hover { background: #f3f4f6; }
        .vocab-tag-option.active { background: #eef2ff; color: #1d4ed8; }
        html[data-theme="dark"] .vocab-tag-dropdown { background: #1E2228; border-color: #2A3038; }
        html[data-theme="dark"] .vocab-tag-option:hover { background: rgba(255,255,255,0.06); }
        html[data-theme="dark"] .vocab-tag-option.active { background: rgba(74,158,255,0.12); color: #4A9EFF; }
        html[data-theme="dark"] .vocab-tag-caret { border-top-color: rgba(255,255,255,0.60); }
        .vocab-list { display: flex; flex-direction: column; gap: 12px; min-height: 0; }
        /* 中间卡片区域：唯一滚动容器 */
        .vocab-list-scroll {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }
        .vocab-pagination { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: 12px; flex-shrink: 0; }
        .vocab-page-info { font-size: 13px; color: #6b7280; margin-right: auto; }
        .vocab-page-status { font-size: 13px; color: #374151; }
        .vocab-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 16px; border-radius: 8px; box-shadow: 0 1px 3px rgba(15,23,42,0.08); transition: box-shadow 0.2s, transform 0.05s; background: #fff; }
        .vocab-item:hover { box-shadow: 0 2px 8px rgba(15,23,42,0.12); }
        .vocab-item-content { flex: 1; min-width: 0; }
        .vocab-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .vocab-item-word { font-size: 16px; font-weight: 600; }
        .vocab-item-labels { display: inline-flex; flex-wrap: wrap; gap: 4px; }
        .vocab-item-type { display: inline-flex; align-items: center; padding: 2px 8px; font-size: 12px; border-radius: 999px; background: #2563eb; color: #fff; }
        .vocab-item-meaning { font-size: 14px; color: #374151; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
        .vocab-item-time { font-size: 12px; color: #9ca3af; margin-top: 6px; }
        .vocab-item-tag { display: inline-flex; align-items: center; padding: 2px 8px; font-size: 12px; border-radius: 999px; border: 1px solid #2563eb; color: #2563eb; background: transparent; }
        .vocab-item-delete { flex-shrink: 0; padding: 6px 12px; font-size: 13px; background: #fff; border: 1px solid #dc2626; color: #dc2626; }
        .vocab-item-delete:hover { background: rgba(220,38,38,0.1); }
        .vocab-export-row { margin-top: 20px; }
        .vocab-empty { text-align: center; padding: 40px 20px; color: #9ca3af; font-size: 14px; }
        html[data-theme="dark"] .vocab-result-card,
        html[data-theme="dark"] .vocab-item { background-color: #1E2228 !important; border: 1px solid #2A3038; }
        html[data-theme="dark"] .vocab-result-card .result-meaning,
        html[data-theme="dark"] .vocab-item-meaning { color: rgba(255,255,255,0.60) !important; }
        html[data-theme="dark"] .vocab-item-time { color: #9ca3af !important; }
        html[data-theme="dark"] .vocab-item-type { background: #2563eb; color: #fff; }
        html[data-theme="dark"] .vocab-item-tag { background: transparent; border-color: #4A9EFF; color: #4A9EFF; }
        html[data-theme="checkin"] .vocab-result-card,
        html[data-theme="checkin"] .vocab-item { background: rgba(255,255,255,0.5) !important; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.6); }
        html[data-theme="yellow-green"] .vocab-result-card,
        html[data-theme="yellow-green"] .vocab-item { background: rgba(255,255,255,0.85) !important; border: 1px solid rgba(34,197,94,0.3); }
        html[data-theme="checkin"] .vocab-tab.active { color: #667eea; border-bottom-color: #667eea; }
        html[data-theme="yellow-green"] .vocab-tab.active { color: #22c55e; border-bottom-color: #22c55e; }
        html[data-theme="orange"] .vocab-tab.active { color: #D95B1A; border-bottom-color: #D95B1A; }
        html[data-theme="lavender"] .vocab-tab.active { color: #7C6CD6; border-bottom-color: #7C6CD6; }
        html[data-theme="dark"] .vocab-item-delete { background: transparent; border-color: #dc2626; color: #f87171; }
        html[data-theme="dark"] .vocab-item-delete:hover { background: rgba(220,38,38,0.2); }
        /* 英文 / 中文 / 标签管理 列表滚动：头部工具栏固定，卡片区域滚动 */
        #section-english .vocab-list,
        #section-chinese .vocab-list {
            flex: 1 1 auto;
            min-height: 0;
            margin-top: 10px;     /* 与工具栏之间固定 10px 间距 */
        }

        /* 复习模式与 TAB */
        .vocab-tabs { display: flex; gap: 16px; margin-bottom: 0; padding: 0; flex-shrink: 0; }
        .vocab-tab { padding: 8px 4px; border: none; background: transparent; cursor: pointer; font-size: 14px; color: #374151; border-bottom: 2px solid transparent; text-align: left; }
        .vocab-tab:hover { color: #2563eb; }
        .vocab-tab.active { color: #2563eb; font-weight: 500; border-bottom-color: #2563eb; }
        .review-section { display: none; padding: 0 0 20px 0; }
        .review-section.active { display: block; }
        #section-english.review-section.active,
        #section-chinese.review-section.active,
        #section-tags.review-section.active {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1 1 auto;
        }
        .review-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
        .review-stat-card { padding: 16px 20px; border-radius: 8px; background: #fff; box-shadow: 0 1px 3px rgba(15,23,42,0.08); min-width: 140px; }
        .review-stat-card .stat-value { font-size: 24px; font-weight: 600; color: #2563eb; }
        .review-stat-card .stat-label { font-size: 13px; color: #6b7280; margin-top: 4px; }
        .review-card-wrap { max-width: 480px; margin: 0 auto 24px; }
        .review-card { padding: 32px 24px; border-radius: 12px; background: #fff; box-shadow: 0 4px 12px rgba(15,23,42,0.12); cursor: pointer; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s, box-shadow 0.2s; }
        .review-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,23,42,0.15); }
        .review-card .card-word { font-size: 28px; font-weight: 600; color: #111827; }
        .review-card .card-meaning { font-size: 15px; color: #374151; line-height: 1.6; margin-top: 12px; text-align: left; white-space: pre-wrap; display: none; }
        .review-card.revealed .card-meaning { display: block; }
        .review-card .card-hint { font-size: 13px; color: #9ca3af; margin-top: 8px; }
        .review-actions { display: none; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .review-actions.visible { display: flex; }
        .review-btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; transition: background 0.2s; }
        .review-btn.forget { background: #fee2e2; color: #dc2626; }
        .review-btn.forget:hover { background: #fecaca; }
        .review-btn.vague { background: #fef3c7; color: #b45309; }
        .review-btn.vague:hover { background: #fde68a; }
        .review-btn.know { background: #d1fae5; color: #047857; }
        .review-btn.know:hover { background: #a7f3d0; }
        .review-shortcuts { font-size: 12px; color: #9ca3af; margin-top: 8px; }
        .review-empty { text-align: center; padding: 48px 24px; color: #6b7280; }
        .review-empty .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .review-progress { font-size: 14px; color: #6b7280; margin-bottom: 12px; }
        html[data-theme="dark"] .vocab-tab { color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .vocab-tab:hover { color: #4A9EFF; }
        html[data-theme="dark"] .vocab-tab.active { color: #4A9EFF; border-bottom-color: #4A9EFF; }
        html[data-theme="dark"] .review-stat-card, html[data-theme="dark"] .review-card { background: #1E2228; border: 1px solid #2A3038; }
        html[data-theme="dark"] .review-stat-card .stat-value { color: #03DAC6; }
        html[data-theme="dark"] .review-card .card-word { color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .review-card .card-meaning { color: rgba(255,255,255,0.60); }
        html[data-theme="dark"] .review-btn.forget { background: rgba(207,102,121,0.18); color: #CF6679; }
        html[data-theme="dark"] .review-btn.vague { background: rgba(74,158,255,0.10); color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .review-btn.know { background: rgba(3,218,198,0.14); color: #03DAC6; }
        /* 编辑抽屉 */
        .vocab-drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; opacity: 0; visibility: hidden; transition: opacity 0.25s, visibility 0.25s; }
        .vocab-drawer-overlay.open { opacity: 1; visibility: visible; }
        .vocab-drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 720px; height: 100%; background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,0.15); z-index: 1000; transform: translateX(100%); transition: transform 0.3s; overflow: hidden; display: flex; flex-direction: column; }
        .vocab-drawer.open { transform: translateX(0); }
        .vocab-drawer-header { flex-shrink: 0; padding: 20px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .vocab-drawer-title-wrap { display: flex; align-items: baseline; gap: 12px; min-width: 0; }
        .vocab-drawer-title { font-size: 18px; font-weight: 600; white-space: nowrap; }
        .vocab-drawer-title-word { font-size: 16px; font-weight: 500; color: #374151; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .vocab-drawer-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; padding: 0 4px; line-height: 1; }
        .vocab-drawer-close:hover { color: #111; }
        .vocab-drawer-body { flex: 1; overflow-y: auto; padding: 24px; }
        .vocab-drawer-field { margin-bottom: 20px; }
        .vocab-drawer-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #374151; }
        .vocab-drawer-display { width: 100%; padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 14px; background: #f9fafb; color: #111827; box-sizing: border-box; height: 38px; }
        .vocab-drawer-input { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; height: 38px; }
        .vocab-drawer-auto-text { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; min-height: 200px; resize: vertical; }
        .vocab-drawer-auto-actions { margin-top: 8px; }
        .vocab-drawer-auto-actions .btn { width: 100px; }
        .vocab-drawer-editor-wrap { border: 1px solid #d1d5db; border-radius: 6px; min-height: 100px; overflow: hidden; }
        .vocab-drawer-editor-wrap .ql-toolbar { border: none; border-bottom: 1px solid #d1d5db; border-radius: 6px 6px 0 0; }
        .vocab-drawer-editor-wrap .ql-container { border: none; border-radius: 0 0 6px 6px; min-height: 60px; }
        .vocab-drawer-textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; resize: vertical; min-height: 80px; box-sizing: border-box; }
        .vocab-drawer-wordforms-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px 16px; }
        .vocab-drawer-wordform-item { display: flex; flex-direction: column; gap: 4px; }
        .vocab-drawer-wordform-label { font-size: 12px; color: #6b7280; font-weight: 400; }
        .vocab-chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; }
        .vocab-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; border: 1px solid #c7d2fe; }
        .vocab-chip button { border: none; background: transparent; cursor: pointer; color: inherit; padding: 0; line-height: 1; font-size: 14px; }
        .vocab-chip-input { border: none; outline: none; min-width: 140px; flex: 1; font-size: 14px; padding: 6px 0; }
        .vocab-syn-related { margin-top: 8px; font-size: 13px; color: #6b7280; }
        .vocab-syn-related-label { margin-bottom: 4px; }
        .vocab-syn-related-list { display: flex; flex-wrap: wrap; gap: 6px; }
        .vocab-syn-related-chip {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            border: 1px dashed #9ca3af;
            font-size: 12px;
            color: #4b5563;
            background: #f9fafb;
        }
        .vocab-drawer-footer { flex-shrink: 0; padding: 16px 24px; border-top: 1px solid #e5e7eb; display: flex; gap: 12px; justify-content: flex-end; }
        .vocab-item-edit { flex-shrink: 0; padding: 6px 12px; font-size: 13px; background: #fff; border: 1px solid #2563eb; color: #2563eb; }
        .vocab-item-edit:hover { background: rgba(37,99,235,0.1); }
        .vocab-item-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* 编辑抽屉：关联词组 */
        .vocab-related-phrases { display: flex; flex-direction: column; gap: 8px; }
        .vocab-related-empty { font-size: 12px; color: #9ca3af; }
        .vocab-related-card {
            border-radius: 6px;
            border: 1px solid #e5e7eb;
            padding: 8px 10px;
            background: #f9fafb;
            font-size: 13px;
        }
        .vocab-related-card-title { font-weight: 500; margin-bottom: 4px; color: #111827; }
        .vocab-related-card-meaning { font-size: 12px; color: #6b7280; }

        /* 标签管理表格 */
        .tags-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tags-table th,
        .tags-table td { padding: 8px 10px; border-bottom: 1px solid #e5e7eb; text-align: left; }
        .tags-table th { background: #f9fafb; font-weight: 500; color: #374151; }
        /* 固定各列表头 / 列宽 */
        .tags-table th:nth-child(1),
        .tags-table td:nth-child(1) { width: 220px; }
        .tags-table th:nth-child(2),
        .tags-table td:nth-child(2) { width: 80px; }
        .tags-table th:nth-child(3),
        .tags-table td:nth-child(3) { width: 100px; }
        .tags-table th:nth-child(4),
        .tags-table td:nth-child(4) { width: 160px; }

        .tags-table td.tags-name-cell { max-width: 220px; }
        .tags-name-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* 编辑态输入框宽度随列宽自动收缩 */
        .tags-name-input { width: 100%; max-width: 100%; box-sizing: border-box; }
        .tags-ops { display: inline-flex; gap: 8px; }
        /* 标签管理：新增区域宽度 + 左对齐，右侧留白 */
        #section-tags .control-panel {
            align-items: flex-start;
        }
        #section-tags .inline-fields-gap {
            gap: 10px;
            max-width: 540px; /* 整行宽度上限，右侧保留明显空白 */
        }
        #section-tags #tag-new-name {
            width: 200px;
            flex: 0 0 200px;
        }
        #section-tags .tag-scope-radio-group {
            width: 200px;
            flex: 0 0 200px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: #374151;
        }
        #section-tags #tag-add-btn {
            width: 120px;
            flex: 0 0 120px;
            box-sizing: border-box;
        }

        html[data-theme="dark"] .vocab-drawer-wordform-label { color: rgba(255,255,255,0.6); }
        html[data-theme="dark"] .vocab-drawer { background: #1E2228; }
        html[data-theme="dark"] .vocab-drawer-header, html[data-theme="dark"] .vocab-drawer-footer { border-color: #2A3038; }
        html[data-theme="dark"] .vocab-drawer-title, html[data-theme="dark"] .vocab-drawer-label { color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .vocab-drawer-display { background: rgba(255,255,255,0.04); border-color: #2A3038; color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .vocab-drawer-input { background: #14171B; border-color: #2A3038; color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .vocab-chip-wrap { background: #14171B; border-color: #2A3038; }
        html[data-theme="dark"] .vocab-chip { background: rgba(74,158,255,0.14); border-color: rgba(74,158,255,0.28); color: rgba(255,255,255,0.87); }
        html[data-theme="dark"] .vocab-chip-input { background: transparent; color: rgba(255,255,255,0.87); }

<script>
(function() {
    "use strict";

    const STORAGE_KEY = "vocabulary_words";
    const REVIEW_INTERVALS = [0, 1, 3, 7, 15, 30];
    const MOEDICT_API = "https://www.moedict.tw/raw/";
    const YOUDAO_API_S = "https://dict.youdao.com/jsonapi_s?doctype=json&jsonversion=4&q=";
    const YOUDAO_API = "https://dict.youdao.com/jsonapi?q=";
    const CORS_PROXY = "https://corsproxy.io/?";
    const CORS_PROXY_ALT = "https://api.allorigins.win/raw?url=";

    /** 通过 CORS 代理请求，避免浏览器跨域/网络限制；主代理失败时尝试备用代理或直连 */
    async function fetchWithProxy(url, signal) {
        try {
            const proxyUrl = CORS_PROXY + encodeURIComponent(url);
            const res = await fetch(proxyUrl, { signal });
            if (res.ok || res.status === 404) return res;
        } catch (_) {}
        try {
            const altUrl = CORS_PROXY_ALT + encodeURIComponent(url);
            const res = await fetch(altUrl, { signal });
            if (res.ok || res.status === 404) return res;
        } catch (_) {}
        try {
            const direct = await fetch(url, { signal });
            if (direct.ok || direct.status === 404) return direct;
        } catch (_) {}
        return { ok: false, status: 0 };
    }

    function formatDateYMD(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
    }

    function stripHtmlToText(html) {
        if (!html) return "";
        const div = document.createElement("div");
        div.innerHTML = String(html);
        return (div.textContent || "").trim();
    }

    function isQuillEmptyHtml(html) {
        return !stripHtmlToText(html);
    }

    function getRelatedPhrasesForWord(word) {
        const w = String(word || "").trim().toLowerCase();
        if (!w) return [];
        const list = getWordList().map(normalizeItem);
        return list.filter(function (item) {
            const t = item.type || "english";
            if (t !== "phrase") return false;
            const phrase = String(item.word || "").toLowerCase();
            return phrase && phrase.includes(w);
        });
    }

    function renderRelatedPhrases(word) {
        const wrap = document.getElementById("drawer-related-phrases");
        const field = document.getElementById("drawer-related-phrases-field");
        if (!wrap || !field) return;
        const baseWord = String(word || "").trim();
        if (!baseWord || editingVocabType !== "english") {
            field.style.display = "none";
            wrap.innerHTML = "";
            return;
        }
        const related = getRelatedPhrasesForWord(baseWord);
        field.style.display = "";
        if (!related.length) {
            wrap.innerHTML = '<div class="vocab-related-empty">暂无关联词组。</div>';
            return;
        }
        wrap.innerHTML = related
            .map(function (item) {
                const zhText = stripHtmlToText(item.meaningZh || item.meaning || "");
                const firstLine = (zhText.split(/\n+/)[0] || "").trim();
                return (
                    '<div class="vocab-related-card">' +
                    '<div class="vocab-related-card-title">' + escapeHtml(item.word || "") + "</div>" +
                    '<div class="vocab-related-card-meaning">' + escapeHtml(firstLine || "") + "</div>" +
                    "</div>"
                );
            })
            .join("");
    }

    function getTagUsageCount(name, scope) {
        if (!name) return 0;
        const list = getWordList().map(normalizeItem);
        return list.filter(function (it) {
            if (!Array.isArray(it.tags)) return false;
            const t = it.type || "english";
            const s = t === "chinese" ? "chinese" : "english";
            if (s !== scope) return false;
            return it.tags.includes(name);
        }).length;
    }

    const TAGS_PAGE_SIZE = 20;
    let pageTags = 1;

    function renderTagsTable() {
        const tbody = document.getElementById("tags-table-body");
        if (!tbody) return;
        const all = Array.isArray(vocabTags) ? vocabTags.slice() : [];

        const total = all.length;
        const totalPages = Math.max(1, Math.ceil(total / TAGS_PAGE_SIZE));
        if (pageTags > totalPages) pageTags = totalPages;
        const start = (pageTags - 1) * TAGS_PAGE_SIZE;
        const pageItems = all.slice(start, start + TAGS_PAGE_SIZE);

        if (!total) {
            tbody.innerHTML = '<tr><td colspan="4" style="padding:16px 10px;color:#6b7280;">暂无标签，请在上方添加。</td></tr>';
        } else if (!pageItems.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="padding:16px 10px;color:#6b7280;">无匹配结果。</td></tr>';
        } else {
            tbody.innerHTML = pageItems
            .map(function (t, idxOnPage) {
                const realIdx = start + idxOnPage;
                const name = t.name || "";
                const scope = t.scope === "chinese" ? "chinese" : "english";
                const count = getTagUsageCount(name, scope);
                const scopeText = scope === "chinese" ? "中文" : "英文";
                return (
                    '<tr data-idx="' + realIdx + '">' +
                    '<td class="tags-name-cell"><span class="tags-name-text">' + escapeHtml(name) + "</span></td>" +
                    "<td>" + scopeText + "</td>" +
                    "<td>" + count + "</td>" +
                    '<td><div class="tags-ops">' +
                    '<button type="button" class="btn tags-edit">编辑</button>' +
                    '<button type="button" class="btn btn-ghost-danger tags-delete">删除</button>' +
                    "</div></td>" +
                    "</tr>"
                );
            })
            .join("");
        }

        // 更新标签分页状态
        const countEl = document.getElementById("vocab-tags-count");
        const statusEl = document.getElementById("vocab-tags-page-status");
        const prevBtn = document.getElementById("vocab-tags-prev");
        const nextBtn = document.getElementById("vocab-tags-next");
        if (countEl) countEl.textContent = "共 " + total + " 条";
        if (statusEl) statusEl.textContent = "第 " + pageTags + " / " + totalPages + " 页";
        if (prevBtn) prevBtn.disabled = pageTags <= 1;
        if (nextBtn) nextBtn.disabled = pageTags >= totalPages;

        tbody.querySelectorAll(".tags-edit").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const tr = btn.closest("tr");
                if (!tr) return;
                const idx = Number(tr.dataset.idx || "-1");
                if (idx < 0 || !vocabTags[idx]) return;
                const tag = vocabTags[idx];
                const nameCell = tr.querySelector(".tags-name-cell");
                const opsCell = tr.querySelector(".tags-ops");
                if (!nameCell || !opsCell) return;
                nameCell.innerHTML = '<input type="text" class="field-control tags-name-input" value="' + escapeHtml(tag.name || "") + '">';
                opsCell.innerHTML =
                    '<button type="button" class="btn primary tags-save">保存</button>' +
                    '<button type="button" class="btn tags-cancel">取消</button>';

                const input = nameCell.querySelector("input");
                if (input) {
                    try { input.focus(); input.setSelectionRange(0, input.value.length); } catch (_) {}
                }
                opsCell.querySelector(".tags-save").addEventListener("click", function () {
                    const newName = String(input && input.value || "").trim();
                    const oldName = tag.name || "";
                    const scope = tag.scope === "chinese" ? "chinese" : "english";
                    if (!newName) return;
                    if (newName === oldName) {
                        renderTagsTable();
                        return;
                    }
                    const exists = vocabTags.some(function (t2, j) {
                        return j !== idx && t2.name === newName && t2.scope === scope;
                    });
                    if (exists) {
                        showToast("×标签已经存在，不能重复添加。", "error");
                        return;
                    }
                    // 更新所有关联词汇的标签名称
                    const list = getWordList().map(normalizeItem);
                    list.forEach(function (it) {
                        if (!Array.isArray(it.tags)) return;
                        const t = it.type || "english";
                        const s = t === "chinese" ? "chinese" : "english";
                        if (s !== scope) return;
                        if (it.tags.includes(oldName)) {
                            it.tags = it.tags.map(function (x) { return x === oldName ? newName : x; });
                        }
                    });
                    vocabCache = list.slice();
                    tag.name = newName;
                    syncVocabToServer(vocabCache);
                    refreshTagFilterOptions();
                    renderEnglishList();
                    renderChineseList();
                    renderTagsTable();
                    showToast("标签已更新");
                });
                opsCell.querySelector(".tags-cancel").addEventListener("click", function () {
                    renderTagsTable();
                });
            });
        });

        tbody.querySelectorAll(".tags-delete").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const tr = btn.closest("tr");
                if (!tr) return;
                const idx = Number(tr.dataset.idx || "-1");
                if (idx < 0 || !vocabTags[idx]) return;
                const tag = vocabTags[idx];
                const name = tag.name || "";
                const scope = tag.scope === "chinese" ? "chinese" : "english";
                const count = getTagUsageCount(name, scope);
                if (count > 0) {
                    showToast("当前标签已被使用，不能删除。", "error");
                    return;
                }
                vocabTags.splice(idx, 1);
                syncVocabToServer(getWordList());
                refreshTagFilterOptions();
                renderTagsTable();
                showToast("标签已删除。");
            });
        });
    }

    /**
     * 检测输入类型：english | chinese | phrase
     * @param {string} input - 用户输入
     * @returns {string} english | chinese | phrase
     */
    function detectLanguage(input) {
        const trimmed = (input || "").trim();
        if (!trimmed) return null;
        const isEnglish = /^[a-zA-Z\s\-']+$/.test(trimmed);
        const isChinese = /[\u4e00-\u9fa5]/.test(trimmed);
        if (isEnglish && !isChinese) return "english";
        if (isChinese) return "chinese";
        return "english";
    }

    /** 有道 API 词形变化字段名映射：name -> 内部 key */
    const YOUDAO_WFS_MAP = {
        "过去式": "pastTense",
        "过去分词": "pastParticiple",
        "现在分词": "presentParticiple",
        "第三人称单数": "thirdPersonSingular",
        "比较级": "comparative",
        "最高级": "superlative",
        "复数": "plural"
    };

    /** 从有道 API 响应中提取词形变化（wfs / wordFormats） */
    function parseYoudaoWordForms(yd) {
        const out = { pastTense: "", pastParticiple: "", presentParticiple: "", thirdPersonSingular: "", comparative: "", superlative: "", plural: "" };
        let wfs = null;
        const wordObj = yd.ec?.word;
        if (wordObj) {
            const first = Array.isArray(wordObj) ? wordObj[0] : wordObj;
            wfs = first?.wfs || yd.wordform?.wfs;
        }
        if (!wfs) wfs = yd.wordform?.wfs;
        if (wfs && Array.isArray(wfs)) {
            wfs.forEach(function (wf) {
                const name = (wf.name || wf.attr?.name || "").trim();
                const val = (wf.value || wf.attr?.value || "").trim();
                if (name && val && YOUDAO_WFS_MAP[name]) {
                    out[YOUDAO_WFS_MAP[name]] = val;
                }
            });
        }
        return out;
    }

    /** 从有道 API 响应中提取英文释义（支持 jsonapi_s 与 jsonapi 两种结构） */
    function parseYoudaoEnglish(yd, word) {
        const parts = [];
        let trs = null;
        let wordObj = yd.ec?.word;
        if (wordObj) {
            trs = Array.isArray(wordObj) ? wordObj[0]?.trs : wordObj?.trs;
        }
        if (trs && Array.isArray(trs)) {
            const texts = trs.map(t => {
                if (t.tran) return t.tran;
                if (t.tr) {
                    const tr = Array.isArray(t.tr) ? t.tr[0] : t.tr;
                    if (tr?.l?.i) {
                        const i = tr.l.i;
                        return Array.isArray(i) ? i.join(" ") : String(i);
                    }
                    if (tr?.trans) return tr.trans;
                }
                return null;
            }).filter(Boolean);
            if (texts.length) parts.push("中文释义：\n" + texts.slice(0, 5).join("；"));
            const posList = trs.map(t => t.pos).filter(Boolean);
            if (posList.length) parts.push("词性：\n" + posList.join("；"));
        }
        // Fallback：部分词（如 sweatpants）只在 web_trans 中有释义
        if (parts.length === 0 && Array.isArray(yd.web_trans)) {
            const wtTexts = yd.web_trans.flatMap(function (w) {
                const trans = Array.isArray(w.trans) ? w.trans : (w.trans ? [w.trans] : []);
                return trans.map(function (t) {
                    return t.value || t.tran || t["#text"] || null;
                }).filter(Boolean);
            });
            if (wtTexts.length) {
                parts.push("中文释义：\n" + wtTexts.slice(0, 5).join("；"));
            }
        }
        if (parts.length === 0 && yd.individual?.trs?.length) {
            const texts = yd.individual.trs.map(t => t.tran).filter(Boolean);
            if (texts.length) parts.push("中文释义：\n" + texts.join("；"));
        }
        if (parts.length === 0 && yd.syno?.synos?.length) {
            const texts = yd.syno.synos.map(s => s.syno?.tran || s.tran).filter(Boolean);
            if (texts.length) parts.push("释义：\n" + texts.join("；"));
        }
        if (parts.length === 0 && yd.phrs?.phrs?.length) {
            const phrTexts = yd.phrs.phrs.slice(0, 3).map(p => {
                const hw = p.phr?.headword?.l?.i || p.headword;
                const tr = p.trs?.[0]?.tr?.l?.i || p.translation;
                return hw && tr ? hw + " " + tr : null;
            }).filter(Boolean);
            if (phrTexts.length) parts.push("短语：\n" + phrTexts.join("；"));
        }
        const simple = yd.simple?.word?.[0];
        if (simple?.usphone || simple?.ukphone) {
            const ph = [simple.ukphone && "英 " + simple.ukphone, simple.usphone && "美 " + simple.usphone].filter(Boolean).join("\n");
            if (ph) parts.unshift("音标：\n" + ph);
        }
        const wordData = Array.isArray(wordObj) ? wordObj[0] : wordObj;
        if (!parts.length && wordData?.usphone) {
            parts.push("音标：\n英 " + (wordData.ukphone || "") + "\n美 " + (wordData.usphone || ""));
        }
        return parts.join("\n\n");
    }

    /**
     * 查询英文单词（有道 API）：优先 jsonapi_s，失败时回退 jsonapi
     */
    async function queryEnglishWord(word, signal) {
        const urls = [
            YOUDAO_API_S + encodeURIComponent(word),
            YOUDAO_API + encodeURIComponent(word) + "&jsonversion=2"
        ];
        for (const url of urls) {
            try {
                const res = await fetchWithProxy(url, signal);
                if (!res || !res.ok) continue;
                const yd = await res.json();
                const meaning = parseYoudaoEnglish(yd, word);
                const wordForms = parseYoudaoWordForms(yd);
                if (meaning) return { success: true, meaning, word, wordForms };
            } catch (_) {}
        }
        return { success: false, meaning: "", word };
    }

    /**
     * 获取中文单字拼音（萌典 API）
     * @param {string} char - 单个汉字
     * @returns {Promise<{meaning: string, success: boolean}>}
     */
    async function getPinyin(char, signal) {
        try {
            const res = await fetchWithProxy(MOEDICT_API + encodeURIComponent(char), signal);
            if (!res.ok) return { success: false, meaning: "" };
            const data = await res.json();
            const heteronyms = data.heteronyms || [];
            const pinyins = heteronyms.map(h => h.pinyin).filter(Boolean);
            const defs = heteronyms.flatMap(h => (h.definitions || []).map(d => d.def)).slice(0, 3);
            let meaning = "拼音：\n" + (pinyins.join(" / ") || "—");
            if (defs.length) meaning += "\n\n释义：\n" + defs.join("；");
            return { success: true, meaning, word: data.title || char };
        } catch (e) {
            return { success: false, meaning: "" };
        }
    }

    /**
     * 查询中文词语（有道 API）：拼音 + 释义
     * @param {string} phrase - 中文词语
     * @returns {Promise<{meaning: string, success: boolean}>}
     */
    async function queryChinesePhrase(phrase, signal) {
        try {
            const res = await fetchWithProxy(YOUDAO_API_S + encodeURIComponent(phrase), signal);
            if (!res.ok) return { success: false, meaning: "" };
            const data = await res.json();
            let meaning = "";
            const ce = data.ce || data.ce_new;
            const simple = data.simple?.word?.[0];
            const phone = simple?.phone || ce?.word?.[0]?.phone || (Array.isArray(ce?.word) ? ce.word[0]?.phone : ce?.word?.phone);
            if (phone) meaning = "拼音：\n" + phone + "\n\n";
            const wordData = ce?.word;
            const trs = Array.isArray(wordData) ? wordData[0]?.trs : wordData?.trs;
            if (trs && trs.length) {
                const texts = trs.map(t => t["#tran"] || t["#text"] || (t.tr && (Array.isArray(t.tr) ? t.tr[0]?.l?.i?.[0] : t.tr))).filter(Boolean);
                if (texts.length) meaning += "释义：\n" + texts.slice(0, 5).join("；");
            }
            if (!meaning && simple?.phone) meaning = "拼音：\n" + simple.phone;
            return { success: !!meaning, meaning: meaning.trim() || "", word: phrase };
        } catch (e) {
            return { success: false, meaning: "" };
        }
    }

    /**
     * 执行查询并展示结果（通过后端大语言模型接口）
     */
    let lastQueryContext = null; // { type, word, meaningZh, meaningEn, pronunciation, wordForms, synonyms, example }
    async function doQuery() {
        const input = document.getElementById("query-input").value.trim();
        const resultEl = document.getElementById("query-result");
        const wordEl = document.getElementById("result-word");
        const meaningEl = document.getElementById("result-meaning");
        const btnQuery = document.getElementById("btn-query");
        const btnAdd = document.getElementById("btn-add-vocab");
        const btnAddWord = document.getElementById("btn-add-word");
        const btnAddPhrase = document.getElementById("btn-add-phrase");

        if (!input) {
            showToast("请输入要查询的内容");
            return;
        }

        btnQuery.disabled = true;
        btnQuery.textContent = "查询中...";
        if (btnAdd) btnAdd.disabled = true;
        if (btnAddWord) btnAddWord.disabled = true;
        if (btnAddPhrase) btnAddPhrase.disabled = true;

        let res = { success: false };
        try {
            const r = await fetch("/api/vocab/llm-query", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: input })
            });
            if (r && r.ok) {
                res = await r.json();
            } else {
                res = { success: false, message: "查询接口返回错误" };
            }
        } catch (e) {
            console.warn("llm query error", e);
            res = { success: false, message: "查询失败，请稍后重试" };
        } finally {
            btnQuery.disabled = false;
            btnQuery.textContent = "查询";
            if (btnAddWord) btnAddWord.disabled = false;
            if (btnAddPhrase) btnAddPhrase.disabled = false;
        }

        const detectedType = detectLanguage(input) || "english";

        if (!res.success || !res.data) {
            wordEl.textContent = input;
            meaningEl.textContent = res.message || "未找到释义";
            resultEl.style.display = "block";
            resultEl.dataset.queryType = detectedType;
            lastQueryContext = {
                type: detectedType,
                word: input,
                meaningZh: "",
                meaningEn: "",
                pronunciation: "",
                wordForms: {},
                synonyms: [],
                example: ""
            };
            if (btnAdd) btnAdd.disabled = false;
            return;
        }

        const d = res.data;
        const word = (d.word || input || "").trim();
        const meaningZh = String(d.meaning_zh || "");
        const meaningEn = String(d.meaning_en || "");

        wordEl.textContent = word;
        // 结果卡片中按“字段名称：字段内容”展示所有解析结果
        const fieldLines = [];
        const pushField = (label, value) => {
            const v = (value == null ? "" : String(value)).trim();
            if (!v) return;
            fieldLines.push(label + "：" + v);
        };
        pushField("发音", d.pronunciation || "");
        pushField("中文释义", meaningZh);
        pushField("英文释义", meaningEn);
        if (Array.isArray(d.synonyms) && d.synonyms.length) {
            pushField("同义词", d.synonyms.map(x => String(x || "").trim()).filter(Boolean).join("，"));
        }
        pushField("过去式", d.past || "");
        pushField("过去分词", d.past_participle || "");
        pushField("现在分词", d.present_participle || "");
        pushField("第三人称单数", d.third_person_singular || "");
        pushField("比较级", d.comparative || "");
        pushField("最高级", d.superlative || "");
        pushField("复数", d.plural || "");
        pushField("例句", d.example || "");

        meaningEl.textContent = fieldLines.join("\n");
        resultEl.style.display = "block";
        resultEl.dataset.queryType = detectedType;

        lastQueryContext = {
            type: detectedType,
            word,
            meaningZh,
            meaningEn,
            pronunciation: String(d.pronunciation || ""),
            wordForms: {
                pastTense: String(d.past || ""),
                pastParticiple: String(d.past_participle || ""),
                presentParticiple: String(d.present_participle || ""),
                thirdPersonSingular: String(d.third_person_singular || ""),
                comparative: String(d.comparative || ""),
                superlative: String(d.superlative || ""),
                plural: String(d.plural || "")
            },
            synonyms: Array.isArray(d.synonyms) ? d.synonyms.map(String) : [],
            example: String(d.example || "")
        };

        if (btnAdd) btnAdd.disabled = false;
    }

    /**
     * “加入词汇本”：打开右侧抽屉编辑（无论是否有释义都允许进入）
     */
    function saveWord() {
        const resultEl = document.getElementById("query-result");
        const wordEl = document.getElementById("result-word");
        const word = (wordEl && wordEl.textContent || "").trim();
        if (resultEl.style.display === "none" || !word) {
            showToast("请先查询后再加入词汇本");
            return;
        }
        const ctx = lastQueryContext || { type: (resultEl && resultEl.dataset.queryType) || "english", word, meaning: "" };
        const list = getWordList();
        let type = ctx.type || "english";

        // 如果当前是英文输入且包含空格（如 take off），视为“英文词组”
        if (type === "english") {
            const w = String(word || "");
            if (/\s/.test(w)) {
                type = "phrase";
                ctx.type = "phrase";
            }
        }

        const exists = list.some(item => (item.type || "english") === type && (item.word || "").toLowerCase() === word.toLowerCase());
        if (exists) {
            showToast("单词已经存在，请勿重复添加");
            return;
        }
        openDrawerForNewFromQuery(ctx);
    }

    /**
     * 自动识别原始文本，填充英文单词相关字段
     * 仅在英文单词模式下生效（editingVocabType === "english"）
     */
    async function autoParseTextFromRaw() {
        if (editingVocabType !== "english") {
            showToast("当前仅支持英文单词自动识别。");
            return;
        }
        const textarea = document.getElementById("drawer-auto-text");
        if (!textarea) return;
        const raw = (textarea.value || "").trim();
        if (!raw) {
            showToast("请输入文本自动识别");
            return;
        }

        // 预处理：简单去掉干扰标签文案，避免影响大模型判断
        const REMOVE_WORDS = ["查看全部", "高中", "初中", "CET4", "CET6", "TOEFL", "GMAT", "考研"];
        let cleaned = raw;
        REMOVE_WORDS.forEach(w => {
            cleaned = cleaned.replaceAll(w, "");
        });
        cleaned = cleaned.trim();
        if (!cleaned) {
            showToast("有效内容为空，请检查文本。");
            return;
        }

        // 调用与查询相同的大语言模型接口，让模型从原始文本中解析各字段
        let res = { success: false };
        try {
            const r = await fetch("/api/vocab/llm-query", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: cleaned })
            });
            if (r && r.ok) {
                res = await r.json();
            } else {
                res = { success: false, message: "自动识别接口返回错误" };
            }
        } catch (e) {
            console.warn("llm auto-parse error", e);
            res = { success: false, message: "自动识别失败，请稍后重试" };
        }

        if (!res.success || !res.data) {
            showToast(res.message || "自动识别失败", "error");
            return;
        }

        const d = res.data;

        // 发音
        const pronEl = document.getElementById("drawer-pronunciation");
        if (pronEl && d.pronunciation) {
            pronEl.value = String(d.pronunciation || "");
        }

        // 中文释义
        if (drawerQuillZh && d.meaning_zh) {
            drawerQuillZh.setText(String(d.meaning_zh || ""));
        }

        // 英文释义
        const enEl = document.getElementById("drawer-meaning-en");
        if (enEl && d.meaning_en) {
            enEl.value = String(d.meaning_en || "");
        }

        // 例句
        const exEl = document.getElementById("drawer-example");
        if (exEl && d.example) {
            exEl.value = String(d.example || "");
        }

        // 词形变化
        setDrawerWordForms({
            pastTense: String(d.past || ""),
            pastParticiple: String(d.past_participle || ""),
            presentParticiple: String(d.present_participle || ""),
            thirdPersonSingular: String(d.third_person_singular || ""),
            comparative: String(d.comparative || ""),
            superlative: String(d.superlative || ""),
            plural: String(d.plural || "")
        });

        // 同义词：追加到当前同义词列表中（去重）
        if (Array.isArray(d.synonyms) && d.synonyms.length) {
            const names = d.synonyms.map(x => String(x || "").trim()).filter(Boolean);
            const set = new Set(drawerSynonyms || []);
            names.forEach(n => set.add(n));
            drawerSynonyms = Array.from(set);
            const synWrap = document.getElementById("drawer-synonyms-wrap");
            const renderSyn = () => renderChipList(synWrap, drawerSynonyms, (idx) => { drawerSynonyms.splice(idx, 1); renderSyn(); });
            renderSyn();
        }

        showToast("自动识别完成");
    }

    /**
     * 计算“关联同义词”：
     * 若在单词 A 中设置了 B 为同义词，则在单词 B 的同义词区域展示 A（只读关联，不写回数据）
     */
    function getRelatedSynonymsForWord(currentWord, currentId) {
        const word = String(currentWord || "").trim();
        if (!word) return [];
        const list = getWordList().map(normalizeItem);
        const seen = new Set();
        const out = [];
        list.forEach(it => {
            if (!it || !Array.isArray(it.synonyms)) return;
            if (currentId && it.id === currentId) return;
            if (it.synonyms.includes(word)) {
                const w = String(it.word || "").trim();
                if (w && !seen.has(w)) {
                    seen.add(w);
                    out.push(w);
                }
            }
        });
        return out;
    }

    function renderRelatedSynonymsForDrawer(currentWord, currentId) {
        const container = document.getElementById("drawer-related-synonyms");
        if (!container) return;
        const list = getRelatedSynonymsForWord(currentWord, currentId);
        if (!list.length) {
            container.style.display = "none";
            container.innerHTML = "";
            return;
        }
        container.style.display = "";
        container.innerHTML =
            '<div class="vocab-syn-related-label">关联同义词（从其他单词关联）</div>' +
            '<div class="vocab-syn-related-list">' +
            list.map(w => '<span class="vocab-syn-related-chip">' + escapeHtml(w) + "</span>").join("") +
            "</div>";
    }

    /**
     * 【新增单词】按钮：直接从查询输入框打开新增抽屉
     * - 若输入为空：toast “请输入单词”
     * - 若有输入：根据语言类型（英文 / 中文）进入对应的添加流程
     * - 不依赖查询结果卡片，始终允许打开抽屉
     */
    function addWordFromInput() {
        const inputEl = document.getElementById("query-input");
        const raw = (inputEl && inputEl.value || "").trim();
        if (!raw) {
            showToast("请输入单词");
            return;
        }
        const list = getWordList();
        let lang = detectLanguage(raw) || "english";
        if (lang !== "chinese") lang = "english";
        const type = lang;
        const exists = list.some(item => (item.type || "english") === type && (item.word || "").toLowerCase() === raw.toLowerCase());
        if (exists) {
            showToast("单词已经存在，请勿重复添加");
            return;
        }
        const ctx = { type, word: raw, meaning: "", wordForms: {} };
        openDrawerForNewFromQuery(ctx);
    }

    /**
     * 从 localStorage 获取词汇列表
     * @returns {Array}
     */
    let vocabCache = [];

    function getWordList() {
        return vocabCache;
    }

    function addDays(dateStr, days) {
        const d = new Date(dateStr);
        d.setDate(d.getDate() + days);
        return formatDateYMD(d);
    }

    function normalizeItem(item) {
        const today = formatDateYMD(new Date());
        let type = item.type || "english";
        if (type === "phrase") {
            const w = String(item.word || "");
            const hasChinese = /[\u4e00-\u9fa5]/.test(w);
            const hasLatin = /[A-Za-z]/.test(w);
            if (hasChinese && !hasLatin) {
                type = "chinese";
            }
        }
        return {
            ...item,
            type,
            level: item.level >= 1 && item.level <= 5 ? item.level : 1,
            reviewCount: typeof item.reviewCount === "number" ? item.reviewCount : 0,
            nextReview: item.nextReview || today,
            meaningZh: item.meaningZh ?? (item.meaning || ""),
            meaningEn: item.meaningEn ?? "",
            pronunciation: item.pronunciation ?? "",
            tags: Array.isArray(item.tags) ? item.tags : [],
            synonyms: Array.isArray(item.synonyms) ? item.synonyms : [],
            example: item.example || "",
            pastTense: item.pastTense ?? "",
            pastParticiple: item.pastParticiple ?? "",
            presentParticiple: item.presentParticiple ?? "",
            thirdPersonSingular: item.thirdPersonSingular ?? "",
            comparative: item.comparative ?? "",
            superlative: item.superlative ?? "",
            plural: item.plural ?? ""
        };
    }

    function getTodayReviewList() {
        const today = formatDateYMD(new Date());
        return getWordList()
            .map(normalizeItem)
            .filter(item => (item.nextReview || today) <= today);
    }

    function getReviewStats() {
        const list = getWordList().map(normalizeItem);
        const today = formatDateYMD(new Date());
        const todayCount = list.filter(item => (item.nextReview || today) <= today).length;
        const totalReviewed = list.reduce((sum, item) => sum + (item.reviewCount || 0), 0);
        return { todayCount, total: list.length, totalReviewed };
    }

    async function syncVocabToServer(list) {
        try {
            await fetch("/api/vocab/state", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: list, tags: vocabTags || [] }),
            });
        } catch (e) {
            console.warn("sync vocab to server failed", e);
        }
    }

    function saveWordList(list) {
        vocabCache = list.slice();
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        } catch (e) {
            console.warn("saveWordList localStorage error", e);
        }
        try { refreshTagFilterOptions(); } catch (_) {}
        syncVocabToServer(list);
    }

    function updateWordAfterReview(id, result) {
        const list = getWordList().map(normalizeItem);
        const item = list.find(w => w.id === id);
        if (!item) return;
        const today = formatDateYMD(new Date());
        let level = item.level;
        if (result === "forget") {
            level = 1;
        } else if (result === "vague") {
            level = Math.max(1, level - 1);
        } else {
            level = Math.min(5, level + 1);
        }
        const days = REVIEW_INTERVALS[level] || 1;
        item.level = level;
        item.reviewCount = (item.reviewCount || 0) + 1;
        item.nextReview = addDays(today, days);
        saveWordList(list);
    }

    /** 格式化释义用于展示：优先中文释义，其次英文释义 */
    function formatMeaningDisplay(item) {
        const zhRaw = (item && (item.meaningZh || item.meaning)) || "";
        const enRaw = (item && item.meaningEn) || "";
        const zh = String(zhRaw || "");
        const en = String(enRaw || "");
        const zhHtml = (zh.includes("<") && zh.includes(">")) ? zh : escapeHtml(zh.replace(/\n/g, " "));
        const enHtml = en ? ((en.includes("<") && en.includes(">")) ? en : escapeHtml(en.replace(/\n/g, " "))) : "";
        return enHtml ? (zhHtml + "<div style=\"margin-top:6px; opacity:0.9;\">" + enHtml + "</div>") : zhHtml;
    }

    function getPinyinCollator() {
        try {
            return new Intl.Collator("zh-Hans-u-co-pinyin", { numeric: true, sensitivity: "base" });
        } catch (_) {
            try { return new Intl.Collator("zh", { numeric: true, sensitivity: "base" }); } catch (__) {}
        }
        return null;
    }

    const pinyinCollator = getPinyinCollator();

    function sortTagsByPinyin(tags) {
        const arr = (tags || []).slice();
        if (pinyinCollator) {
            arr.sort((a, b) => pinyinCollator.compare(String(a || ""), String(b || "")));
        } else {
            arr.sort((a, b) => String(a || "").localeCompare(String(b || "")));
        }
        return arr;
    }

    function collectUniqueTagsByType(type) {
        // 从标签库 vocabTags 中按 scope 收集，保持与标签管理一致
        const scope = (type === "chinese") ? "chinese" : "english";
        const names = (vocabTags || [])
            .filter(t => t && t.scope === scope)
            .map(t => t.name)
            .filter(Boolean);
        const set = new Set(names.map(s => String(s).trim()).filter(Boolean));
        return sortTagsByPinyin(Array.from(set));
    }

    function renderTagDropdown(type, keyword) {
        const dropdown = document.getElementById("tag-filter-" + type + "-dropdown");
        if (!dropdown) return;
        const options = (type === "english") ? tagOptionsEnglish : tagOptionsChinese;
        const selected = (type === "english") ? selectedTagEnglish : selectedTagChinese;
        const kw = String(keyword || "").trim().toLowerCase();
        const filtered = kw
            ? options.filter(t => String(t).toLowerCase().includes(kw))
            : options.slice();
        const items = ["", ...filtered];
        dropdown.innerHTML = items.map(function(t) {
            const label = t ? t : "全部";
            const active = (t === selected) ? " active" : "";
            return '<div class="vocab-tag-option' + active + '" data-value="' + escapeHtml(t) + '">' + escapeHtml(label) + "</div>";
        }).join("");
        dropdown.querySelectorAll(".vocab-tag-option").forEach(function(el) {
            el.addEventListener("mousedown", function(e) {
                e.preventDefault();
                const val = el.dataset.value || "";
                if (type === "english") selectedTagEnglish = val;
                else selectedTagChinese = val;
                const input = document.getElementById("tag-filter-" + type);
                if (input) input.value = val;
                hideTagDropdown(type);
                if (type === "english") renderEnglishList();
                else renderChineseList();
            });
        });
    }

                stripHtmlToText(item.meaningEn || "").toLowerCase().includes(search) ||
                (Array.isArray(item.tags) ? item.tags.join(" ").toLowerCase().includes(search) : false) ||
                (Array.isArray(item.synonyms) ? item.synonyms.join(" ").toLowerCase().includes(search) : false)

    function renderChipList(wrapEl, items, onRemove) {

    function addChipValue(list, raw) {
        const v = (raw || "").trim();
        if (!v) return list;
        if (list.includes(v)) return list;
        return [...list, v];
    }

    function bindChipInput(inputEl, getList, setList, wrapEl, renderFn) {
        if (!inputEl) return;
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === "," || e.key === "，") {
                e.preventDefault();
                const next = addChipValue(getList(), inputEl.value.replace(/[，,]$/, ""));
                setList(next);
                inputEl.value = "";
                renderFn();
            }
        });
        inputEl.addEventListener("blur", () => {
            const next = addChipValue(getList(), inputEl.value);
            if (next.length !== getList().length) setList(next);
            inputEl.value = "";
            renderFn();
        });
    }

    function toQuillHtmlFromTextOrHtml(v) {
        const s = String(v || "");
        if (!s) return "";
        if (s.includes("<") && s.includes(">")) return s;
        return "<p>" + escapeHtml(s).replace(/\n/g, "</p><p>") + "</p>";
    }

    function parseQueryMeaningToFields(ctx) {
        // 新版：优先从大模型结构化结果中取字段，若缺失再从原 meaning 文本中兜底解析
        const meaning = String(ctx.meaning || ctx.meaningZh || "");
        const fromPron = String(ctx.pronunciation || "").trim();
        const fromZh = String(ctx.meaningZh || "").trim();

        let pronunciation = fromPron;
        let zh = fromZh;

        if (!pronunciation || !zh) {
            const pickBlock = (label) => {
                const idx = meaning.indexOf(label);
                if (idx < 0) return "";
                const after = meaning.slice(idx + label.length);
                const parts = after.split(/\n\s*\n/);
                return (parts[0] || "").trim();
            };
            if (!pronunciation) {
                pronunciation = (pickBlock("音标：") || pickBlock("拼音：") || "").trim();
            }
            if (!zh) {
                zh = (pickBlock("中文释义：") || pickBlock("释义：") || meaning).trim();
            }
        }

        return {
            pronunciation,
            meaningZhHtml: toQuillHtmlFromTextOrHtml(zh),
            meaningEnHtml: ""
        };
    }

    function openDrawerForEdit(id) {
        const list = getWordList().map(normalizeItem);

        editingVocabId = id;
        editingVocabType = item.type || "english";

        document.getElementById("drawer-meaning-en").value = stripHtmlToText(item.meaningEn || "");
        document.getElementById("drawer-example").value = item.example || "";
        setDrawerWordForms({
            pastTense: item.pastTense ?? "",
            pastParticiple: item.pastParticiple ?? "",

            thirdPersonSingular: item.thirdPersonSingular ?? "",
            comparative: item.comparative ?? "",
            superlative: item.superlative ?? "",
            plural: item.plural ?? ""
        });

            (drawerSynonyms && drawerSynonyms.length > 0);

                .filter(t => t && t.scope === scopeForItem)
                .map(t => t.name)
        );

            item.synonyms = drawerSynonyms.slice();

            item.pastParticiple = wf.pastParticiple;

                meaningEn: enText,
                example: exampleText,
                tags: drawerTags.slice(),
                synonyms: drawerSynonyms.slice(),
                meaning: zhHtml,
                pastTense: wf.pastTense,
                pastParticiple: wf.pastParticiple,
                presentParticiple: wf.presentParticiple,
                thirdPersonSingular: wf.thirdPersonSingular,
                comparative: wf.comparative,
                superlative: wf.superlative,
                plural: wf.plural,
                time: new Date().toLocaleString("zh-CN"),
                level: 1,
                reviewCount: 0,
                nextReview: today
            });
        }

        saveWordList(list);

        showToast("已保存");

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function showReviewCard() {
        const item = reviewQueue[reviewIndex];
        if (!item) {
            document.getElementById("review-flow-area").style.display = "none";
            document.getElementById("review-empty-area").style.display = "block";
            renderReviewStats();
            return;
        }
        document.getElementById("card-word").textContent = item.word;
        const cardMeaning = document.getElementById("card-meaning");
        const zh = item.meaningZh || item.meaning || "";
        const en = item.meaningEn || "";
        const html =
            (String(zh).includes("<") && String(zh).includes(">") ? String(zh) : "<div>" + escapeHtml(String(zh)).replace(/\n/g, "<br/>") + "</div>") +
            (en ? "<div style=\"margin-top:10px; opacity:0.9;\">" + (String(en).includes("<") && String(en).includes(">") ? String(en) : escapeHtml(String(en)).replace(/\n/g, "<br/>")) + "</div>" : "");
        cardMeaning.innerHTML = html;
        cardMeaning.style.whiteSpace = "normal";
        cardMeaning.style.display = "none";
        document.getElementById("review-card").classList.remove("revealed");
        document.getElementById("review-actions").classList.remove("visible");
        document.getElementById("card-hint").style.display = "block";
        document.getElementById("review-progress").textContent = (reviewIndex + 1) + " / " + reviewQueue.length;
        reviewRevealed = false;
    }

    function revealAnswer() {
        if (reviewRevealed) return;
        reviewRevealed = true;
        document.getElementById("review-card").classList.add("revealed");
        document.getElementById("card-meaning").style.display = "block";
        document.getElementById("card-hint").style.display = "none";
        document.getElementById("review-actions").classList.add("visible");
    }

    function handleReviewResult(result) {
        const item = reviewQueue[reviewIndex];
        if (!item) return;
        updateWordAfterReview(item.id, result);
        reviewIndex++;
        showReviewCard();
    }

    function startReview() {

            document.getElementById("review-flow-area").style.display = "none";
            document.getElementById("review-empty-area").style.display = "block";

        renderReviewStats();
        document.getElementById("btn-start-review").addEventListener("click", startReview);
        document.getElementById("review-card").addEventListener("click", revealAnswer);
        document.getElementById("review-actions").querySelectorAll(".review-btn").forEach(btn => {
            btn.addEventListener("click", () => handleReviewResult(btn.dataset.result));
        });
        document.addEventListener("keydown", function reviewKeyHandler(e) {
            if (!document.getElementById("section-review").classList.contains("active")) return;
            if (document.activeElement && (document.activeElement.tagName === "INPUT" || document.activeElement.tagName === "TEXTAREA")) return;
            if (document.getElementById("review-flow-area").style.display !== "none") {
                if (e.code === "Space") {
                    e.preventDefault();
                    if (reviewRevealed) return;
                    revealAnswer();
                } else if (e.key === "1" && reviewRevealed) { e.preventDefault(); handleReviewResult("forget"); }
                else if (e.key === "2" && reviewRevealed) { e.preventDefault(); handleReviewResult("vague"); }
                else if (e.key === "3" && reviewRevealed) { e.preventDefault(); handleReviewResult("know"); }
            }
        });
    }

    async function initVocabData() {
        let list = [];
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            list = raw ? JSON.parse(raw) : [];
        } catch (e) {
            list = [];
        }
        const today = formatDateYMD(new Date());
        const needsMigrate = list.some(item =>
            item.level == null || item.reviewCount == null || !item.nextReview ||
            (item.meaning && !item.meaningZh) || item.tags == null || item.synonyms == null
        );
        if (needsMigrate) {
            list = list.map(item => ({
                ...item,
                level: item.level ?? 1,
                reviewCount: item.reviewCount ?? 0,
                nextReview: item.nextReview ?? today,
                meaningZh: item.meaningZh ?? (item.meaning || ""),
                meaningEn: item.meaningEn ?? "",
                pronunciation: item.pronunciation ?? "",
                tags: Array.isArray(item.tags) ? item.tags : [],
                synonyms: Array.isArray(item.synonyms) ? item.synonyms : []
            }));
        }
        vocabCache = list.slice();
        try {
            const res = await fetch("/api/vocab/state");
            if (res && res.ok) {
                const json = await res.json();
                if (json && json.success && json.data && Array.isArray(json.data.items)) {
                    const serverItems = json.data.items.map(normalizeItem);
                    vocabCache = serverItems;
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverItems));
                    } catch (_) {}
                    const rawTags = Array.isArray(json.data.tags) ? json.data.tags : [];
                    const seen = new Set();
                    vocabTags = [];
                    rawTags.forEach(function (t) {
                        if (!t) return;
                        const name = String(t.name || "").trim();
                        let scope = String(t.scope || "english").toLowerCase();
                        if (scope !== "chinese") scope = "english";
                        if (!name) return;
                        const key = name + "::" + scope;
                        if (seen.has(key)) return;
                        seen.add(key);
                        vocabTags.push({ name, scope });
                    });
                } else {
                    // 后端没有 tags 字段时，根据本地 items 构建初始标签库
                    const seen = new Set();
                    vocabTags = [];
                    vocabCache.forEach(function (it) {
                        if (!it || !Array.isArray(it.tags)) return;
                        const t = it.type || "english";
                        const scope = t === "chinese" ? "chinese" : "english";
                        it.tags.forEach(function (tag) {
                            const name = String(tag || "").trim();
                            if (!name) return;
                            const key = name + "::" + scope;
                            if (seen.has(key)) return;
                            seen.add(key);
                            vocabTags.push({ name, scope });
                        });
                    });
                }
            }
        } catch (e) {
            console.warn("load vocab from server failed", e);
        }
    }

        // 分组标签：只能从标签库中选择，支持关键字模糊搜索 + 回车选中第一条 + 点击选项选择
        (function () {
            const inputEl = document.getElementById("drawer-tags-input");

            if (!inputEl || !dropdownEl) return;

            function getCurrentTagScope() {
                return (editingVocabType === "chinese") ? "chinese" : "english";
            }

            function getScopedTagNames() {
                const scope = getCurrentTagScope();
                const all = Array.isArray(vocabTags) ? vocabTags : [];
                const names = [];
                const seen = new Set();
                all.forEach(function (t) {
                    if (!t || t.scope !== scope) return;
                    const name = String(t.name || "").trim();
                    if (!name || seen.has(name)) return;
                    seen.add(name);
                    names.push(name);
                });
                // 简单按拼音/字母排序
                names.sort((a, b) => a.localeCompare(b, "zh-Hans-u-co-pinyin"));
                return names;
            }

            function refreshDropdown() {
                const keyword = (inputEl.value || "").trim().toLowerCase();
                const allNames = getScopedTagNames();
                const filtered = allNames.filter(function (name) {
                    return !keyword || name.toLowerCase().includes(keyword);
                });
                if (!filtered.length) {
                    dropdownEl.innerHTML = "";
                    dropdownEl.style.display = "none";
                    return;
                }
                dropdownEl.innerHTML = filtered
                    .map(function (name) {
                        return '<div class="vocab-tag-option" data-value="' + escapeHtml(name) + '">' + escapeHtml(name) + "</div>";
                    })
                    .join("");
                dropdownEl.style.display = "block";
            }

            inputEl.addEventListener("focus", function () {
                refreshDropdown();
            });
            inputEl.addEventListener("input", function () {
                refreshDropdown();
            });
            inputEl.addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    const first = dropdownEl.querySelector(".vocab-tag-option");
                    if (first) {
                        const val = first.dataset.value || first.textContent || "";
                        const name = String(val).trim();
                        if (name && !drawerTags.includes(name)) {
                            drawerTags = drawerTags.concat([name]);
                            renderTags();

                        inputEl.value = "";
                        dropdownEl.style.display = "none";

            if (!input || !dropdown || !wrap) return;

                const v = String(input.value || "").trim();
                if (!v) {
                    if (type === "english") {
                        selectedTagEnglish = "";
                        pageEnglish = 1;
                        renderEnglishList();
                    } else {
                        selectedTagChinese = "";
                        pageChinese = 1;
                        renderChineseList();
                    }
                    return;
                }
                const options = (type === "english") ? tagOptionsEnglish : tagOptionsChinese;
                const ok = options.includes(v);
                if (ok) {
                    if (type === "english") {
                        selectedTagEnglish = v;
                        pageEnglish = 1;
                        renderEnglishList();
                    } else {
                        selectedTagChinese = v;
                        pageChinese = 1;
                        renderChineseList();

                // 输入中仅用于过滤选项；当清空时立即回到“全部”
