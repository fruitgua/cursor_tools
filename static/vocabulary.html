<script>
(function() {
    "use strict";

    const STORAGE_KEY = "vocabulary_words";
    const STORAGE_VERSION_KEY = "vocabulary_words_version";
    const REVIEW_INTERVALS = [0, 1, 3, 7, 15, 30];
    const MOEDICT_API = "https://www.moedict.tw/raw/";
    const YOUDAO_API_S = "https://dict.youdao.com/jsonapi_s?doctype=json&jsonversion=4&q=";
    const YOUDAO_API = "https://dict.youdao.com/jsonapi?q=";
    const CORS_PROXY = "https://corsproxy.io/?";
    const CORS_PROXY_ALT = "https://api.allorigins.win/raw?url=";

    /** 通过 CORS 代理请求，避免浏览器跨域/网络限制；主代理失败时尝试备用代理或直连 */
    async function fetchWithProxy(url, signal) {
        try {
            const proxyUrl = CORS_PROXY + encodeURIComponent(url);
            const res = await fetch(proxyUrl, { signal });
            if (res.ok || res.status === 404) return res;
        } catch (_) {}
        try {
            const altUrl = CORS_PROXY_ALT + encodeURIComponent(url);
            const res = await fetch(altUrl, { signal });
            if (res.ok || res.status === 404) return res;
        } catch (_) {}
        try {
            const direct = await fetch(url, { signal });
            if (direct.ok || direct.status === 404) return direct;
        } catch (_) {}
        return { ok: false, status: 0 };
    }

    function formatDateYMD(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
    }

    function stripHtmlToText(html) {
        if (!html) return "";
        const div = document.createElement("div");
        div.innerHTML = String(html);
        return (div.textContent || "").trim();
    }

    function isQuillEmptyHtml(html) {
        return !stripHtmlToText(html);
    }

    function getRelatedPhrasesForWord(word) {
        const w = String(word || "").trim().toLowerCase();
        if (!w) return [];
        const list = getWordList().map(normalizeItem);
        return list.filter(function (item) {
            const t = item.type || "english";
            if (t !== "phrase") return false;
            const phrase = String(item.word || "").toLowerCase();
            return phrase && phrase.includes(w);
        });
    }

    function renderRelatedPhrases(word) {
        const wrap = document.getElementById("drawer-related-phrases");
        const field = document.getElementById("drawer-related-phrases-field");
        if (!wrap || !field) return;
        const baseWord = String(word || "").trim();
        if (!baseWord || editingVocabType !== "english") {
            field.style.display = "none";
            wrap.innerHTML = "";
            return;
        }
        const related = getRelatedPhrasesForWord(baseWord);
        field.style.display = "";
        if (!related.length) {
            wrap.innerHTML = '<div class="vocab-related-empty">暂无关联词组。</div>';
            return;
        }
        wrap.innerHTML = related
            .map(function (item) {
                const zhText = stripHtmlToText(item.meaningZh || item.meaning || "");
                const firstLine = (zhText.split(/\n+/)[0] || "").trim();
                return (
                    '<div class="vocab-related-card">' +
                    '<div class="vocab-related-card-title">' + escapeHtml(item.word || "") + "</div>" +
                    '<div class="vocab-related-card-meaning">' + escapeHtml(firstLine || "") + "</div>" +
                    "</div>"
                );
            })
            .join("");
    }

    function getTagUsageCount(name, scope) {
        if (!name) return 0;
        const list = getWordList().map(normalizeItem);
        return list.filter(function (it) {
            if (!Array.isArray(it.tags)) return false;
            const t = it.type || "english";
            const s = t === "chinese" ? "chinese" : "english";
            if (s !== scope) return false;
            return it.tags.includes(name);
        }).length;
    }

    const TAGS_PAGE_SIZE = 20;
    let pageTags = 1;

    function renderTagsTable() {
        const tbody = document.getElementById("tags-table-body");
        if (!tbody) return;
        const all = Array.isArray(vocabTags) ? vocabTags.slice() : [];

        const total = all.length;
        const totalPages = Math.max(1, Math.ceil(total / TAGS_PAGE_SIZE));
        if (pageTags > totalPages) pageTags = totalPages;
        const start = (pageTags - 1) * TAGS_PAGE_SIZE;
        const pageItems = all.slice(start, start + TAGS_PAGE_SIZE);

        if (!total) {
            tbody.innerHTML = '<tr><td colspan="4" style="padding:16px 10px;color:#6b7280;">暂无标签，请在上方添加。</td></tr>';
        } else if (!pageItems.length) {
            tbody.innerHTML = '<tr><td colspan="4" style="padding:16px 10px;color:#6b7280;">无匹配结果。</td></tr>';
        } else {
            tbody.innerHTML = pageItems
            .map(function (t, idxOnPage) {
                const realIdx = start + idxOnPage;
                const name = t.name || "";
                const scope = t.scope === "chinese" ? "chinese" : "english";
                const count = getTagUsageCount(name, scope);
                const scopeText = scope === "chinese" ? "中文" : "英文";
                return (
                    '<tr data-idx="' + realIdx + '">' +
                    '<td class="tags-name-cell"><span class="tags-name-text">' + escapeHtml(name) + "</span></td>" +
                    "<td>" + scopeText + "</td>" +
                    "<td>" + count + "</td>" +
                    '<td><div class="tags-ops">' +
                    '<button type="button" class="btn tags-edit">编辑</button>' +
                    '<button type="button" class="btn btn-ghost-danger tags-delete">删除</button>' +
                    "</div></td>" +
                    "</tr>"
                );
            })
            .join("");
        }

        // 更新标签分页状态
        const countEl = document.getElementById("vocab-tags-count");
        const statusEl = document.getElementById("vocab-tags-page-status");
        const prevBtn = document.getElementById("vocab-tags-prev");
        const nextBtn = document.getElementById("vocab-tags-next");
        if (countEl) countEl.textContent = "共 " + total + " 条";
        if (statusEl) statusEl.textContent = "第 " + pageTags + " / " + totalPages + " 页";
        if (prevBtn) prevBtn.disabled = pageTags <= 1;
        if (nextBtn) nextBtn.disabled = pageTags >= totalPages;

        tbody.querySelectorAll(".tags-edit").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const tr = btn.closest("tr");
                if (!tr) return;
                const idx = Number(tr.dataset.idx || "-1");
                if (idx < 0 || !vocabTags[idx]) return;
                const tag = vocabTags[idx];
                const nameCell = tr.querySelector(".tags-name-cell");
                const opsCell = tr.querySelector(".tags-ops");
                if (!nameCell || !opsCell) return;
                nameCell.innerHTML = '<input type="text" class="field-control tags-name-input" value="' + escapeHtml(tag.name || "") + '">';
                opsCell.innerHTML =
                    '<button type="button" class="btn primary tags-save">保存</button>' +
                    '<button type="button" class="btn tags-cancel">取消</button>';

                const input = nameCell.querySelector("input");
                if (input) {
                    try { input.focus(); input.setSelectionRange(0, input.value.length); } catch (_) {}
                }
                opsCell.querySelector(".tags-save").addEventListener("click", function () {
                    const newName = String(input && input.value || "").trim();
                    const oldName = tag.name || "";
                    const scope = tag.scope === "chinese" ? "chinese" : "english";
                    if (!newName) return;
                    if (newName === oldName) {
                        renderTagsTable();
                        return;
                    }
                    const exists = vocabTags.some(function (t2, j) {
                        return j !== idx && t2.name === newName && t2.scope === scope;
                    });
                    if (exists) {
                        showToast("×标签已经存在，不能重复添加。", "error");
                        return;
                    }
                    // 更新所有关联词汇的标签名称
                    const list = getWordList().map(normalizeItem);
                    list.forEach(function (it) {
                        if (!Array.isArray(it.tags)) return;
                        const t = it.type || "english";
                        const s = t === "chinese" ? "chinese" : "english";
                        if (s !== scope) return;
                        if (it.tags.includes(oldName)) {
                            it.tags = it.tags.map(function (x) { return x === oldName ? newName : x; });
                        }
                    });
                    vocabCache = list.slice();
                    tag.name = newName;
                    syncVocabToServer(vocabCache);
                    refreshTagFilterOptions();
                    renderEnglishList();
                    renderChineseList();
                    renderTagsTable();
                    showToast("标签已更新");
                });
                opsCell.querySelector(".tags-cancel").addEventListener("click", function () {
                    renderTagsTable();
                });
            });
        });

        tbody.querySelectorAll(".tags-delete").forEach(function (btn) {
            btn.addEventListener("click", function () {
                const tr = btn.closest("tr");
                if (!tr) return;
                const idx = Number(tr.dataset.idx || "-1");
                if (idx < 0 || !vocabTags[idx]) return;
                const tag = vocabTags[idx];
                const name = tag.name || "";
                const scope = tag.scope === "chinese" ? "chinese" : "english";
                const count = getTagUsageCount(name, scope);
                if (count > 0) {
                    showToast("当前标签已被使用，不能删除。", "error");
                    return;
                }
                requestDeleteTag(idx, name, scope);
            });
        });
    }

    /**
     * 检测输入类型：english | chinese | phrase
     * @param {string} input - 用户输入
     * @returns {string} english | chinese | phrase
     */
    function detectLanguage(input) {
        const trimmed = (input || "").trim();
        if (!trimmed) return null;
        const isEnglish = /^[a-zA-Z\s\-']+$/.test(trimmed);
        const isChinese = /[\u4e00-\u9fa5]/.test(trimmed);
        if (isEnglish && !isChinese) return "english";
        if (isChinese) return "chinese";
        return "english";
    }

    /** 有道 API 词形变化字段名映射：name -> 内部 key */
    const YOUDAO_WFS_MAP = {
        "过去式": "pastTense",
        "过去分词": "pastParticiple",
        "现在分词": "presentParticiple",
        "第三人称单数": "thirdPersonSingular",
        "比较级": "comparative",
        "最高级": "superlative",
        "复数": "plural"
    };

    /** 从有道 API 响应中提取词形变化（wfs / wordFormats） */
    function parseYoudaoWordForms(yd) {
        const out = { pastTense: "", pastParticiple: "", presentParticiple: "", thirdPersonSingular: "", comparative: "", superlative: "", plural: "" };
        let wfs = null;
        const wordObj = yd.ec?.word;
        if (wordObj) {
            const first = Array.isArray(wordObj) ? wordObj[0] : wordObj;
            wfs = first?.wfs || yd.wordform?.wfs;
        }
        if (!wfs) wfs = yd.wordform?.wfs;
        if (wfs && Array.isArray(wfs)) {
            wfs.forEach(function (wf) {
                const name = (wf.name || wf.attr?.name || "").trim();
                const val = (wf.value || wf.attr?.value || "").trim();
                if (name && val && YOUDAO_WFS_MAP[name]) {
                    out[YOUDAO_WFS_MAP[name]] = val;
                }
            });
        }
        return out;
    }

    /** 从有道 API 响应中提取英文释义（支持 jsonapi_s 与 jsonapi 两种结构） */
    function parseYoudaoEnglish(yd, word) {
        const parts = [];
        let trs = null;
        let wordObj = yd.ec?.word;
        if (wordObj) {
            trs = Array.isArray(wordObj) ? wordObj[0]?.trs : wordObj?.trs;
        }
        if (trs && Array.isArray(trs)) {
            const texts = trs.map(t => {
                if (t.tran) return t.tran;
                if (t.tr) {
                    const tr = Array.isArray(t.tr) ? t.tr[0] : t.tr;
                    if (tr?.l?.i) {
                        const i = tr.l.i;
                        return Array.isArray(i) ? i.join(" ") : String(i);
                    }
                    if (tr?.trans) return tr.trans;
                }
                return null;
            }).filter(Boolean);
            if (texts.length) parts.push("中文释义：\n" + texts.slice(0, 5).join("；"));
            const posList = trs.map(t => t.pos).filter(Boolean);
            if (posList.length) parts.push("词性：\n" + posList.join("；"));
        }
        // Fallback：部分词（如 sweatpants）只在 web_trans 中有释义
        if (parts.length === 0 && Array.isArray(yd.web_trans)) {
            const wtTexts = yd.web_trans.flatMap(function (w) {
                const trans = Array.isArray(w.trans) ? w.trans : (w.trans ? [w.trans] : []);
                return trans.map(function (t) {
                    return t.value || t.tran || t["#text"] || null;
                }).filter(Boolean);
            });
            if (wtTexts.length) {
                parts.push("中文释义：\n" + wtTexts.slice(0, 5).join("；"));
            }
        }
        if (parts.length === 0 && yd.individual?.trs?.length) {
            const texts = yd.individual.trs.map(t => t.tran).filter(Boolean);
            if (texts.length) parts.push("中文释义：\n" + texts.join("；"));
        }
        if (parts.length === 0 && yd.syno?.synos?.length) {
            const texts = yd.syno.synos.map(s => s.syno?.tran || s.tran).filter(Boolean);
            if (texts.length) parts.push("释义：\n" + texts.join("；"));
        }
        if (parts.length === 0 && yd.phrs?.phrs?.length) {
            const phrTexts = yd.phrs.phrs.slice(0, 3).map(p => {
                const hw = p.phr?.headword?.l?.i || p.headword;
                const tr = p.trs?.[0]?.tr?.l?.i || p.translation;
                return hw && tr ? hw + " " + tr : null;
            }).filter(Boolean);
            if (phrTexts.length) parts.push("短语：\n" + phrTexts.join("；"));
        }
        const simple = yd.simple?.word?.[0];
        if (simple?.usphone || simple?.ukphone) {
            const ph = [simple.ukphone && "英 " + simple.ukphone, simple.usphone && "美 " + simple.usphone].filter(Boolean).join("\n");
            if (ph) parts.unshift("音标：\n" + ph);
        }
        const wordData = Array.isArray(wordObj) ? wordObj[0] : wordObj;
        if (!parts.length && wordData?.usphone) {
            parts.push("音标：\n英 " + (wordData.ukphone || "") + "\n美 " + (wordData.usphone || ""));
        }
        return parts.join("\n\n");
    }

    /**
     * 查询英文单词（有道 API）：优先 jsonapi_s，失败时回退 jsonapi
     */
    async function queryEnglishWord(word, signal) {
        const urls = [
            YOUDAO_API_S + encodeURIComponent(word),
            YOUDAO_API + encodeURIComponent(word) + "&jsonversion=2"
        ];
        for (const url of urls) {
            try {
                const res = await fetchWithProxy(url, signal);
                if (!res || !res.ok) continue;
                const yd = await res.json();
                const meaning = parseYoudaoEnglish(yd, word);
                const wordForms = parseYoudaoWordForms(yd);
                if (meaning) return { success: true, meaning, word, wordForms };
            } catch (_) {}
        }
        return { success: false, meaning: "", word };
    }

    /**
     * 获取中文单字拼音（萌典 API）
     * @param {string} char - 单个汉字
     * @returns {Promise<{meaning: string, success: boolean}>}
     */
    async function getPinyin(char, signal) {
        try {
            const res = await fetchWithProxy(MOEDICT_API + encodeURIComponent(char), signal);
            if (!res.ok) return { success: false, meaning: "", pinyin: "" };
            const data = await res.json();
            const heteronyms = data.heteronyms || [];
            const pinyins = heteronyms.map(h => h.pinyin).filter(Boolean);
            const defs = heteronyms.flatMap(h => (h.definitions || []).map(d => d.def)).slice(0, 3);
            const pinyinJoined = (pinyins.join(" / ") || "").trim();
            let meaning = "拼音：\n" + (pinyinJoined || "—");
            if (defs.length) meaning += "\n\n释义：\n" + defs.join("；");
            return { success: true, meaning, word: data.title || char, pinyin: pinyinJoined };
        } catch (e) {
            return { success: false, meaning: "", pinyin: "" };
        }
    }

    /**
     * 查询中文词语（有道 API）：拼音 + 释义
     * @param {string} phrase - 中文词语
     * @returns {Promise<{meaning: string, success: boolean}>}
     */
    async function queryChinesePhrase(phrase, signal) {
        try {
            const res = await fetchWithProxy(YOUDAO_API_S + encodeURIComponent(phrase), signal);
            if (!res.ok) return { success: false, meaning: "", pinyin: "" };
            const data = await res.json();
            let meaning = "";
            const ce = data.ce || data.ce_new;
            const simple = data.simple?.word?.[0];
            const phone = simple?.phone || ce?.word?.[0]?.phone || (Array.isArray(ce?.word) ? ce.word[0]?.phone : ce?.word?.phone);
            if (phone) meaning = "拼音：\n" + phone + "\n\n";
            const wordData = ce?.word;
            const trs = Array.isArray(wordData) ? wordData[0]?.trs : wordData?.trs;
            if (trs && trs.length) {
                const texts = trs.map(t => t["#tran"] || t["#text"] || (t.tr && (Array.isArray(t.tr) ? t.tr[0]?.l?.i?.[0] : t.tr))).filter(Boolean);
                if (texts.length) meaning += "释义：\n" + texts.slice(0, 5).join("；");
            }
            if (!meaning && simple?.phone) meaning = "拼音：\n" + simple.phone;
            const pinyinRaw = (phone || simple?.phone || "").trim();
            return {
                success: !!meaning,
                meaning: meaning.trim() || "",
                word: phrase,
                pinyin: pinyinRaw
            };
        } catch (e) {
            return { success: false, meaning: "", pinyin: "" };
        }
    }

    /** 从释义文本中提取「拼音：xxx」一行（兼容模型把拼音写在 meaning_zh 里的情况） */
    function extractPinyinLineFromText(text) {
        const s = String(text || "");
        const m = s.match(/(?:^|[\n\r])\s*拼音\s*[：:]\s*([^\n\r]+)/);
        return m ? m[1].trim() : "";
    }

    /** 从萌典/有道返回的整段文案中提取「释义：」正文（词典为主释义） */
    function extractShiyiFromChineseDictMeaning(meaning) {
        const s = String(meaning || "").trim();
        if (!s) return "";
        const labels = ["释义：", "中文释义："];
        for (let i = 0; i < labels.length; i++) {
            const label = labels[i];
            const idx = s.indexOf(label);
            if (idx < 0) continue;
            let rest = s.slice(idx + label.length).trim();
            const nextHdr = rest.search(/\n\s*(?:拼音|释义|中文释义|短语|词性)\s*[：:]/);
            if (nextHdr > 0) rest = rest.slice(0, nextHdr).trim();
            if (rest) return rest;
        }
        return "";
    }

    /** 词典仅有拼音无「释义：」时，去掉开头拼音块，剩余作兜底释义 */
    function stripLeadingPinyinBlockFromDictMeaning(meaning) {
        const s = String(meaning || "").trim();
        if (!s) return "";
        if (!/^拼音\s*[：:]/m.test(s)) return s;
        return s.replace(/^拼音\s*[：:][^\n]*(?:\n+|$)/m, "").trim();
    }

    function chineseDictPinyinToField(dictRes, queryTrimmed) {
        const p = dictRes && String(dictRes.pinyin || "").trim();
        if (!p) return "";
        return queryTrimmed.length === 1 ? p.replace(/\s*\/\s*/g, " ").trim() : p;
    }

    /**
     * 执行查询并展示结果（通过后端大语言模型接口）
     */
    let lastQueryContext = null; // { type, word, meaningZh, meaningEn, pronunciation, wordForms, synonyms, example }
    let pendingQueryText = "";   // “已存在是否继续查询”时暂存输入

    function findExistingWordInVocab(rawInput) {
        const input = String(rawInput || "").trim();
        if (!input) return null;
        const list = getWordList();
        const lower = input.toLowerCase();
        return list.find(item => String(item.word || "").trim().toLowerCase() === lower) || null;
    }

    async function doQueryInternal(input) {
        const resultEl = document.getElementById("query-result");
        const wordEl = document.getElementById("result-word");
        const meaningEl = document.getElementById("result-meaning");
        const btnQuery = document.getElementById("btn-query");
        const btnAdd = document.getElementById("btn-add-vocab");

        if (!input) {
            showToast("请输入要查询的内容");
            return;
        }

        const inputTrim = input.trim();
        const detectedType = detectLanguage(inputTrim) || "english";

        btnQuery.disabled = true;
        btnQuery.textContent = "查询中...";
        if (btnAdd) btnAdd.disabled = true;

        const llmPromise = (async () => {
            try {
                const r = await fetch("/api/vocab/llm-query", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text: inputTrim })
                });
                if (r) {
                    let j = null;
                    try { j = await r.json(); } catch (_) { j = null; }
                    if (r.ok) return j;
                    if (j && typeof j === "object") return j;
                    return { success: false, message: "查询接口返回错误(" + (r.status || 0) + ")" };
                }
                return { success: false, message: "查询接口返回错误" };
            } catch (e) {
                console.warn("llm query error", e);
                return { success: false, message: "查询失败，请稍后重试" };
            }
        })();

        const dictPromise =
            detectedType === "chinese" && inputTrim
                ? inputTrim.length === 1
                    ? getPinyin(inputTrim, undefined)
                    : queryChinesePhrase(inputTrim, undefined)
                : Promise.resolve(null);

        let res;
        let dictRes = null;
        try {
            const pair = await Promise.all([llmPromise, dictPromise]);
            res = pair[0];
            dictRes = pair[1];
        } finally {
            btnQuery.disabled = false;
            btnQuery.textContent = "查询";
        }

        const dictUsable =
            detectedType === "chinese" &&
            dictRes &&
            dictRes.success &&
            !!(String(dictRes.pinyin || "").trim() || String(dictRes.meaning || "").trim());

        if ((!res.success || !res.data) && !(dictUsable)) {
            wordEl.textContent = inputTrim;
            meaningEl.textContent = (res && res.message) || "未找到释义";
            resultEl.style.display = "block";
            resultEl.dataset.queryType = detectedType;
            lastQueryContext = {
                type: detectedType,
                word: inputTrim,
                meaningZh: "",
                meaningEn: "",
                pronunciation: "",
                wordForms: {},
                synonyms: [],
                example: ""
            };
            if (btnAdd) btnAdd.disabled = false;
            return;
        }

        // 中文且词典可用、大模型失败：仅展示词典（拼音 + 释义）
        if ((!res.success || !res.data) && dictUsable) {
            const word = String(dictRes.word || inputTrim).trim() || inputTrim;
            const pronunciationOut = chineseDictPinyinToField(dictRes, inputTrim);
            let meaningZh =
                extractShiyiFromChineseDictMeaning(dictRes.meaning) ||
                stripLeadingPinyinBlockFromDictMeaning(dictRes.meaning);
            wordEl.textContent = word;
            const fieldLines = [];
            const pushField = (label, value) => {
                const v = (value == null ? "" : String(value)).trim();
                if (!v) return;
                fieldLines.push(label + "：" + v);
            };
            pushField("拼音", pronunciationOut);
            pushField("中文释义", meaningZh);
            meaningEl.textContent = fieldLines.join("\n");
            resultEl.style.display = "block";
            resultEl.dataset.queryType = "chinese";
            lastQueryContext = {
                type: "chinese",
                word,
                meaningZh,
                meaningEn: "",
                pronunciation: pronunciationOut,
                wordForms: {},
                synonyms: [],
                example: ""
            };
            if (btnAdd) btnAdd.disabled = false;
            return;
        }

        const d = res.data;
        const word = (d.word || inputTrim || "").trim();
        let meaningZh = String(d.meaning_zh || "");
        const meaningEn = String(d.meaning_en || "");

        let pronunciationOut = String(d.pronunciation || "").trim();
        if (detectedType === "chinese" && dictUsable) {
            const fromDict = chineseDictPinyinToField(dictRes, inputTrim);
            if (fromDict) pronunciationOut = fromDict;
            const shiyi = extractShiyiFromChineseDictMeaning(dictRes.meaning);
            const dictFallback = shiyi || stripLeadingPinyinBlockFromDictMeaning(dictRes.meaning);
            const llmZh = meaningZh.trim();
            if (dictFallback) {
                meaningZh = llmZh ? dictFallback + "\n\n" + llmZh : dictFallback;
            }
            d.pronunciation = pronunciationOut;
        } else if (detectedType === "chinese") {
            if (!pronunciationOut) {
                const extracted = extractPinyinLineFromText(meaningZh);
                if (extracted) pronunciationOut = extracted;
            }
            if (!pronunciationOut) {
                try {
                    const q = (word || inputTrim).trim();
                    if (q.length === 1) {
                        const r = await getPinyin(q, undefined);
                        if (r && r.pinyin) pronunciationOut = String(r.pinyin).replace(/\s*\/\s*/g, " ").trim();
                    } else if (q.length > 1) {
                        const r = await queryChinesePhrase(q, undefined);
                        if (r && r.pinyin) pronunciationOut = String(r.pinyin).trim();
                    }
                } catch (_) {}
            }
            d.pronunciation = pronunciationOut;
        }

        wordEl.textContent = word;
        // 结果卡片中按“字段名称：字段内容”展示所有解析结果
        const fieldLines = [];
        const pushField = (label, value) => {
            const v = (value == null ? "" : String(value)).trim();
            if (!v) return;
            fieldLines.push(label + "：" + v);
        };
        pushField(detectedType === "chinese" ? "拼音" : "发音", pronunciationOut);
        pushField("中文释义", meaningZh);
        pushField("英文释义", meaningEn);
        if (Array.isArray(d.synonyms) && d.synonyms.length) {
            pushField("同义词", d.synonyms.map(x => String(x || "").trim()).filter(Boolean).join("，"));
        }
        pushField("过去式", d.past || "");
        pushField("过去分词", d.past_participle || "");
        pushField("现在分词", d.present_participle || "");
        pushField("第三人称单数", d.third_person_singular || "");
        pushField("比较级", d.comparative || "");
        pushField("最高级", d.superlative || "");
        pushField("复数", d.plural || "");
        pushField("例句", d.example || "");

        meaningEl.textContent = fieldLines.join("\n");
        resultEl.style.display = "block";
        resultEl.dataset.queryType = detectedType;

        lastQueryContext = {
            type: detectedType,
            word,
            meaningZh,
            meaningEn,
            pronunciation: pronunciationOut,
            wordForms: {
                pastTense: String(d.past || ""),
                pastParticiple: String(d.past_participle || ""),
                presentParticiple: String(d.present_participle || ""),
                thirdPersonSingular: String(d.third_person_singular || ""),
                comparative: String(d.comparative || ""),
                superlative: String(d.superlative || ""),
                plural: String(d.plural || "")
            },
            synonyms: Array.isArray(d.synonyms) ? d.synonyms.map(String) : [],
            example: String(d.example || "")
        };

        if (btnAdd) btnAdd.disabled = false;
    }

    /**
     * 查询按钮入口：先检查当前单词库中是否已存在同名单词，存在则弹窗确认是否继续查询接口
     */
    async function doQuery() {
        const inputEl = document.getElementById("query-input");
        const raw = (inputEl && inputEl.value || "").trim();
        if (!raw) {
            showToast("请输入要查询的内容");
            return;
        }
        const exists = findExistingWordInVocab(raw);
        const modal = document.getElementById("query-exists-modal");
        if (exists && modal) {
            pendingQueryText = raw;
            modal.classList.remove("hidden");
            return;
        }
        await doQueryInternal(raw);
    }

    /**
     * “加入词汇本”：打开右侧抽屉编辑（无论是否有释义都允许进入）
     */
    function saveWord() {
        const resultEl = document.getElementById("query-result");
        const wordEl = document.getElementById("result-word");
        const word = (wordEl && wordEl.textContent || "").trim();
        if (resultEl.style.display === "none" || !word) {
            showToast("请先查询后再加入词汇本");
            return;
        }
        const ctx = lastQueryContext || { type: (resultEl && resultEl.dataset.queryType) || "english", word, meaning: "" };
        const list = getWordList();
        let type = ctx.type || "english";

        // 如果当前是英文输入且包含空格（如 take off），视为“英文词组”
        if (type === "english") {
            const w = String(word || "");
            if (/\s/.test(w)) {
                type = "phrase";
                ctx.type = "phrase";
            }
        }

        const exists = list.some(item => (item.type || "english") === type && (item.word || "").toLowerCase() === word.toLowerCase());
        if (exists) {
            showToast("单词已经存在，请勿重复添加");
            return;
        }
        openDrawerForNewFromQuery(ctx);
    }

    /**
     * 自动识别原始文本，填充英文单词相关字段（本地解析版）
     * 规则：
     * - 按行解析，支持 "字段名：内容" 或 "字段名:内容"
     * - "："左侧为字段名称，右侧为内容；同一字段多行会自动拼接为多行
     * - 支持字段：
     *   - 中文释义 / 英文释义 / 例句 / 同义词 / 发音
     *   - 过去式 / 过去分词 / 现在分词 / 第三人称单数 / 比较级 / 最高级 / 复数
     * - 同义词按中文逗号 "，"、英文逗号 "," 等分隔
     */
    async function autoParseTextFromRaw() {
        if (editingVocabType !== "english") {
            showToast("当前仅支持英文单词自动识别。");
            return;
        }
        const textarea = document.getElementById("drawer-auto-text");
        if (!textarea) return;
        const raw = (textarea.value || "").trim();
        if (!raw) {
            showToast("请输入文本自动识别");
            return;
        }

        const lines = raw.split(/\r?\n+/);
        const data = {
            pronunciation: "",
            meaning_zh: "",
            meaning_en: "",
            example: "",
            synonyms: "",
            past_tense: "",
            past_participle: "",
            present_participle: "",
            third_person: "",
            comparative: "",
            superlative: "",
            plural: ""
        };

        const normalizeKey = (k) => {
            const s = String(k || "").trim();
            if (!s) return "";
            if (["中文释义", "释义", "中文"].includes(s)) return "meaning_zh";
            if (["英文释义", "英文解释", "英文"].includes(s)) return "meaning_en";
            if (["例句", "例句英文", "例句中文"].includes(s)) return "example";
            if (["同义词", "近义词"].includes(s)) return "synonyms";
            if (["发音", "音标", "读音", "拼音"].includes(s)) return "pronunciation";
            // 词形变化
            if (["过去式", "过去形", "past", "past tense"].includes(s)) return "past_tense";
            if (["过去分词", "past participle"].includes(s)) return "past_participle";
            if (["现在分词", "ing", "present participle"].includes(s)) return "present_participle";
            if (["第三人称单数", "三单", "third person"].includes(s)) return "third_person";
            if (["比较级", "comparative"].includes(s)) return "comparative";
            if (["最高级", "superlative"].includes(s)) return "superlative";
            if (["复数", "plural"].includes(s)) return "plural";
            return "";
        };

        const appendValue = (key, value) => {
            if (!key || !value) return;
            if (!data[key]) data[key] = value;
            else data[key] += "\n" + value;
        };

        let currentKey = "";
        lines.forEach((line) => {
            const t = String(line || "").trim();
            if (!t) return;
            let idx = t.indexOf("：");
            if (idx < 0) idx = t.indexOf(":");
            if (idx > -1) {
                const left = t.slice(0, idx);
                const right = t.slice(idx + 1).trim();
                const key = normalizeKey(left);
                currentKey = key;
                if (key) appendValue(key, right);
            } else if (currentKey) {
                appendValue(currentKey, t);
            }
        });

        if (
            !data.pronunciation &&
            !data.meaning_zh &&
            !data.meaning_en &&
            !data.example &&
            !data.synonyms &&
            !data.past_tense &&
            !data.past_participle &&
            !data.present_participle &&
            !data.third_person &&
            !data.comparative &&
            !data.superlative &&
            !data.plural
        ) {
            showToast("未识别到有效字段，请检查文本格式。");
            return;
        }

        // 发音
        const pronEl = document.getElementById("drawer-pronunciation");
        if (pronEl && data.pronunciation) {
            pronEl.value = data.pronunciation;
        }

        // 中文释义（富文本：保持换行）
        if (drawerQuillZh && data.meaning_zh) {
            drawerQuillZh.setText(String(data.meaning_zh || ""));
        }

        // 英文释义
        const enEl = document.getElementById("drawer-meaning-en");
        if (enEl && data.meaning_en) {
            enEl.value = data.meaning_en;
        }

        // 例句
        const exEl = document.getElementById("drawer-example");
        if (exEl && data.example) {
            exEl.value = data.example;
        }

        // 词形变化：直接填入对应输入框
        const setVal = (id, val) => {
            if (!val) return;
            const el = document.getElementById(id);
            if (el) el.value = val;
        };
        setVal("drawer-past-tense", data.past_tense);
        setVal("drawer-past-participle", data.past_participle);
        setVal("drawer-present-participle", data.present_participle);
        setVal("drawer-third-person", data.third_person);
        setVal("drawer-comparative", data.comparative);
        setVal("drawer-superlative", data.superlative);
        setVal("drawer-plural", data.plural);

        // 同义词：按分隔符拆分并追加到当前列表（去重）
        if (data.synonyms) {
            const names = String(data.synonyms || "")
                .split(/[,，、;；\s]+/)
                .map(x => x.trim())
                .filter(Boolean);
            if (names.length) {
                const set = new Set(drawerSynonyms || []);
                names.forEach(n => set.add(n));
                drawerSynonyms = Array.from(set);
                const synWrap = document.getElementById("drawer-synonyms-wrap");
                const renderSyn = () => renderChipList(synWrap, drawerSynonyms, (idx) => { drawerSynonyms.splice(idx, 1); renderSyn(); });
                renderSyn();
            }
        }

        showToast("自动识别完成");
    }

    /**
     * 计算“关联同义词”：
     * 若在单词 A 中设置了 B 为同义词，则在单词 B 的同义词区域展示 A（只读关联，不写回数据）
     */
    function getRelatedSynonymsForWord(currentWord, currentId) {
        const word = String(currentWord || "").trim();
        if (!word) return [];
        const list = getWordList().map(normalizeItem);
        const seen = new Set();
        const out = [];
        list.forEach(it => {
            if (!it || !Array.isArray(it.synonyms)) return;
            if (currentId && it.id === currentId) return;
            if (it.synonyms.includes(word)) {
                const w = String(it.word || "").trim();
                if (w && !seen.has(w)) {
                    seen.add(w);
                    out.push(w);
                }
            }
        });
        return out;
    }

    function renderRelatedSynonymsForDrawer(currentWord, currentId) {
        const container = document.getElementById("drawer-related-synonyms");
        if (!container) return;
        const list = getRelatedSynonymsForWord(currentWord, currentId);
        if (!list.length) {
            container.style.display = "none";
            container.innerHTML = "";
            return;
        }
        container.style.display = "";
        container.innerHTML =
            '<div class="vocab-syn-related-label">关联同义词（从其他单词关联）</div>' +
            '<div class="vocab-syn-related-list">' +
            list.map(w => '<span class="vocab-syn-related-chip">' + escapeHtml(w) + "</span>").join("") +
            "</div>";
    }

    /**
     * 从 localStorage 获取词汇列表
     * @returns {Array}
     */
    let vocabCache = [];

    function getWordList() {
        return vocabCache;
    }

    function addDays(dateStr, days) {
        const d = new Date(dateStr);
        d.setDate(d.getDate() + days);
        return formatDateYMD(d);
    }

    function normalizeItem(item) {
        const today = formatDateYMD(new Date());
        let type = item.type || "english";
        if (type === "phrase") {
            const w = String(item.word || "");
            const hasChinese = /[\u4e00-\u9fa5]/.test(w);
            const hasLatin = /[A-Za-z]/.test(w);
            if (hasChinese && !hasLatin) {
                type = "chinese";
            }
        }
        return {
            ...item,
            type,
            level: item.level >= 1 && item.level <= 5 ? item.level : 1,
            reviewCount: typeof item.reviewCount === "number" ? item.reviewCount : 0,
            nextReview: item.nextReview || today,
            meaningZh: item.meaningZh ?? (item.meaning || ""),
            meaningEn: item.meaningEn ?? "",
            pronunciation: item.pronunciation ?? "",
            tags: Array.isArray(item.tags) ? item.tags : [],
            synonyms: Array.isArray(item.synonyms) ? item.synonyms : [],
            example: item.example || "",
            pastTense: item.pastTense ?? "",
            pastParticiple: item.pastParticiple ?? "",
            presentParticiple: item.presentParticiple ?? "",
            thirdPersonSingular: item.thirdPersonSingular ?? "",
            comparative: item.comparative ?? "",
            superlative: item.superlative ?? "",
            plural: item.plural ?? "",
            quizCount: typeof item.quizCount === "number" ? item.quizCount : 0,
            quizCorrect: typeof item.quizCorrect === "number" ? item.quizCorrect : 0,
            quizLastDate: item.quizLastDate || ""
        };
    }

    function getTodayReviewList() {
        const today = formatDateYMD(new Date());
        return getWordList()
            .map(normalizeItem)
            .filter(item => (item.nextReview || today) <= today);
    }

    function getReviewStats() {
        const list = getWordList().map(normalizeItem);
        const today = formatDateYMD(new Date());
        const todayCount = list.filter(item => (item.nextReview || today) <= today).length;
        const totalReviewed = list.reduce((sum, item) => sum + (item.reviewCount || 0), 0);
        return { todayCount, total: list.length, totalReviewed };
    }

    async function syncVocabToServer(list) {
        try {
            await fetch("/api/vocab/state", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: list, tags: vocabTags || [] }),
            });
        } catch (e) {
            console.warn("sync vocab to server failed", e);
        }
    }

    function saveWordList(list) {
        vocabCache = list.slice();
        // 简单版本号：每次保存时自增，用于多标签页之间做最新数据判断
        let nextVersion = 1;
        try {
            const cur = parseInt(localStorage.getItem(STORAGE_VERSION_KEY) || "0", 10);
            nextVersion = isNaN(cur) ? 1 : cur + 1;
        } catch (_) {}
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
            localStorage.setItem(STORAGE_VERSION_KEY, String(nextVersion));
        } catch (e) {
            console.warn("saveWordList localStorage error", e);
        }
        try { refreshTagFilterOptions(); } catch (_) {}
        syncVocabToServer(list);
    }

    function updateWordAfterReview(id, result) {
        const list = getWordList().map(normalizeItem);
        const item = list.find(w => w.id === id);
        if (!item) return;
        const today = formatDateYMD(new Date());
        let level = item.level;
        if (result === "forget") {
            level = 1;
        } else if (result === "vague") {
            level = Math.max(1, level - 1);
        } else {
            level = Math.min(5, level + 1);
        }
        const days = REVIEW_INTERVALS[level] || 1;
        item.level = level;
        item.reviewCount = (item.reviewCount || 0) + 1;
        item.nextReview = addDays(today, days);
        saveWordList(list);
    }

    function getPinyinCollator() {
        try {
            return new Intl.Collator("zh-Hans-u-co-pinyin", { numeric: true, sensitivity: "base" });
        } catch (_) {
            try { return new Intl.Collator("zh", { numeric: true, sensitivity: "base" }); } catch (__) {}
        }
        return null;
    }

    const pinyinCollator = getPinyinCollator();

    function sortTagsByPinyin(tags) {
        const arr = (tags || []).slice();
        if (pinyinCollator) {
            arr.sort((a, b) => pinyinCollator.compare(String(a || ""), String(b || "")));
        } else {
            arr.sort((a, b) => String(a || "").localeCompare(String(b || "")));
        }
        return arr;
    }

    function collectUniqueTagsByType(type) {
        // 从标签库 vocabTags 中按 scope 收集，保持与标签管理一致
        const scope = (type === "chinese") ? "chinese" : "english";
        const names = (vocabTags || [])
            .filter(t => t && t.scope === scope)
            .map(t => t.name)
            .filter(Boolean);
        const set = new Set(names.map(s => String(s).trim()).filter(Boolean));
        return sortTagsByPinyin(Array.from(set));
    }

    // 统一朗读功能（基于浏览器 Web Speech API），带 15 秒节流
    let lastSpeakAt = 0;
    function speakWord(text, langHint, pronunciationText) {
        if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
            showToast("当前浏览器不支持朗读功能");
            return;
        }
        const now = Date.now();
        if (now - lastSpeakAt < 15000) {
            showToast("请勿连续点击。");
            return;
        }
        lastSpeakAt = now;

        const baseText = String(text || "").trim();
        if (!baseText) return;

        // 从发音/拼音字段中拆分多个发音：按换行和常见分隔符切分
        const variants = [];
        const rawPron = String(pronunciationText || "").trim();
        if (rawPron) {
            rawPron
                .split(/[\n;]/)
                .map(s => s.trim())
                .filter(Boolean)
                .forEach(s => variants.push(s));
        }
        // 至少要有一个朗读内容；如果没有专门发音，就直接读单词本身
        if (!variants.length) {
            variants.push(baseText);
        }

        const utterances = [];
        const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
        variants.forEach(v => {
            const utter = new SpeechSynthesisUtterance(v);
            // 语言选择：根据类型或内容粗略判断
            let lang = "en-US";
            if (langHint === "english" || langHint === "phrase") {
                lang = "en-US";
            } else if (langHint === "chinese") {
                lang = "zh-CN";
            } else {
                lang = /[\u4e00-\u9fa5]/.test(v) ? "zh-CN" : "en-US";
            }
            utter.lang = lang;

            // 选择匹配语言的 voice：优先 female，再退回任意同语言
            if (voices && voices.length) {
                const primary = voices.filter(vc => vc.lang && vc.lang.startsWith(lang.split("-")[0]));
                let cand = null;
                if (primary.length) {
                    const female = primary.find(vc => /female/i.test(vc.name || ""));
                    cand = female || primary[0];
                } else {
                    cand = voices.find(vc => vc.lang === lang) || voices[0];
                }
                if (cand) utter.voice = cand;
            }

            // 默认配置（可按需修改）
            if (lang.startsWith("en")) {
                utter.rate = 0.9;   // 英文稍微慢一点
                utter.pitch = 1.0;
                utter.volume = 0.9;
            } else if (lang.startsWith("zh")) {
                utter.rate = 1.0;   // 中文正常语速
                utter.pitch = 1.0;
                utter.volume = 0.9;
            } else {
                utter.rate = 1.0;
                utter.pitch = 1.0;
                utter.volume = 0.9;
            }

            utterances.push(utter);
        });

        window.speechSynthesis.cancel();
        utterances.forEach(u => window.speechSynthesis.speak(u));
    }

    function parseQueryMeaningToFields(ctx) {
        // 新版：优先从大模型结构化结果中取字段，若缺失再从原 meaning 文本中兜底解析
        const meaning = String(ctx.meaning || ctx.meaningZh || "");

        let pronunciation = fromPron;
        let zh = fromZh;

        if (!pronunciation && ctx.type === "chinese") {
            pronunciation = extractPinyinLineFromText(fromZh) || extractPinyinLineFromText(meaning);
        }

        if (!pronunciation || !zh) {
            const pickBlock = (label) => {
                const idx = meaning.indexOf(label);
                if (idx < 0) return "";
                const after = meaning.slice(idx + label.length);
                const parts = after.split(/\n\s*\n/);
                return (parts[0] || "").trim();
            };
            if (!pronunciation) {
                pronunciation = (pickBlock("音标：") || pickBlock("拼音：") || "").trim();
            }
            if (!zh) {
                zh = (pickBlock("中文释义：") || pickBlock("释义：") || meaning).trim();
            }
        }

        return {
            pronunciation,
            meaningZhHtml: toQuillHtmlFromTextOrHtml(zh),
            meaningEnHtml: ""
        };
    }

    function updateQuizSummary() {
        const list = getWordList().map(normalizeItem);
        const englishWords = list.filter(item => item.type === "english");
        const phrases = list.filter(item => item.type === "phrase");
        const today = formatDateYMD(new Date());
        // 今日复习单词数：今日有答题记录的英文单词 + 英文词组数量（按词条去重）
        const todayQuizCount =
            englishWords.filter(item => item.quizLastDate === today).length +
            phrases.filter(item => item.quizLastDate === today).length;
        // 正确率：排除 quizCount 为 0 的词条后，sum(quizCorrect) / sum(quizCount)，包含英文单词和英文词组
        const answered = [...englishWords, ...phrases].filter(item => (item.quizCount || 0) > 0);
        let accuracy = 0;
        if (answered.length > 0) {
            const totalCount = answered.reduce((sum, it) => sum + (it.quizCount || 0), 0);
            const totalCorrect = answered.reduce((sum, it) => sum + (it.quizCorrect || 0), 0);
            if (totalCount > 0) {
                accuracy = Math.round((totalCorrect / totalCount) * 100);
            }
        }
        const totalEl = document.getElementById("quiz-total-english");
        const todayEl = document.getElementById("quiz-today-count");
        const accEl = document.getElementById("quiz-accuracy");
        if (totalEl) totalEl.textContent = String(englishWords.length + phrases.length);
        if (todayEl) todayEl.textContent = String(todayQuizCount);
        if (accEl) accEl.textContent = String(accuracy) + "%";
    }

    function buildQuizQuestions() {
        const list = getWordList().map(normalizeItem);
        const englishWords = list.filter(item => item.type === "english");
        const phrases = list.filter(item => item.type === "phrase");

        const questions = [];
        const usedIds = new Set();

        function addQuestion(q) {
            if (!q || !q.wordId || usedIds.has(q.wordId) || questions.length >= 10) return;
            questions.push(q);
            usedIds.add(q.wordId);
        }

        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function sortByQuizCount(arr) {
            return arr.slice().sort((a, b) => {
                const qa = a.quizCount || 0;
                const qb = b.quizCount || 0;
                if (qa !== qb) return qa - qb;
                const aw = (a.word || "").toLowerCase();
                const bw = (b.word || "").toLowerCase();
                return aw.localeCompare(bw);
            });
        }

        const MAX_T1 = 4; // 每组最多 4 题词形
        const MAX_T2 = 3; // 每组最多 3 题英文→中文
        const MAX_T3 = 3; // 每组最多 3 题词组→中文
        let t1Count = 0;
        let t2Count = 0;
        let t3Count = 0;

        // 题型 1：词形填空（优先选择 quizCount 较低的单词）
        const englishWithForms = sortByQuizCount(
            englishWords.filter(item =>
                item.pastTense || item.pastParticiple || item.presentParticiple ||
                item.thirdPersonSingular || item.comparative || item.superlative || item.plural
            )
        );
        const formKeys = [
            ["pastTense", "过去式"],
            ["pastParticiple", "过去分词"],
            ["presentParticiple", "现在分词"],
            ["thirdPersonSingular", "第三人称单数"],
            ["comparative", "比较级"],
            ["superlative", "最高级"],
            ["plural", "复数"]
        ];

        englishWithForms.forEach(item => {
            if (questions.length >= 10 || t1Count >= MAX_T1) return;
            const available = formKeys.filter(([key]) => item[key]);
            if (!available.length) return;
            const [key, label] = pickRandom(available);
            addQuestion({
                type: 1,
                wordId: item.id,
                word: item.word,
                formKey: key,
                prompt: `请填写单词「${item.word}」的${label}：`,
                answerCorrect: String(item[key] || "").trim()
            });
            t1Count++;
        });

        // 题型 2：英文单词 → 中文释义模糊（优先选择 quizCount 较低的单词）
        const englishWithZh = sortByQuizCount(
            englishWords.filter(item => (item.meaningZh || item.meaning))
        );
        englishWithZh.forEach(item => {
            if (questions.length >= 10 || t2Count >= MAX_T2) return;
            addQuestion({
                type: 2,
                wordId: item.id,
                word: item.word,
                prompt: `请填写单词「${item.word}」的中文释义关键字：`,
                answerCorrect: stripHtmlToText(item.meaningZh || item.meaning || "")
            });
            t2Count++;
        });

        // 题型 3：英文词组 → 中文释义模糊（优先选择 quizCount 较低的词组）
        const phrasesWithZh = sortByQuizCount(
            phrases.filter(item => (item.meaningZh || item.meaning))
        );
        phrasesWithZh.forEach(item => {
            if (questions.length >= 10 || t3Count >= MAX_T3) return;
            addQuestion({
                type: 3,
                wordId: item.id,
                word: item.word,
                prompt: `请填写词组「${item.word}」的中文释义关键字：`,
                answerCorrect: stripHtmlToText(item.meaningZh || item.meaning || "")
            });
            t3Count++;
        });

        // 简化：题型 4 暂不实现关联词组，只保留前三类题目，确保不重复

        return questions.slice(0, 10);
    }

            if (item.presentParticiple) fields.push({ label: "现在分词", value: item.presentParticiple });
            if (item.thirdPersonSingular) fields.push({ label: "三单", value: item.thirdPersonSingular });
            if (item.comparative) fields.push({ label: "比较级", value: item.comparative });
            if (item.superlative) fields.push({ label: "最高级", value: item.superlative });

                    .map(f => `<span class="quiz-form-item"><span class="quiz-form-label">${f.label}：</span><span>${escapeHtml(String(f.value || ""))}</span></span>`)

            relPhrasesEl.textContent = v;

    function renderQuizWrongList() {
        const listEl = document.getElementById("quiz-wrong-list");
        const statusEl = document.getElementById("quiz-wrong-page-status");
        const selectEl = document.getElementById("quiz-wrong-page-select");
        if (!listEl || !statusEl || !selectEl) return;
        const total = quizWrongWords.length;
        const totalPages = Math.max(1, Math.ceil(total / QUIZ_WRONG_PAGE_SIZE));
        if (quizWrongPage > totalPages) quizWrongPage = totalPages;
        const start = (quizWrongPage - 1) * QUIZ_WRONG_PAGE_SIZE;
        const pageItems = quizWrongWords.slice(start, start + QUIZ_WRONG_PAGE_SIZE);
        if (!total) {
            listEl.innerHTML = '<div class="quiz-detail-text" style="padding:8px 4px;color:#6b7280;">暂无错题，先去做几组题吧。</div>';
        } else if (!pageItems.length) {
            listEl.innerHTML = '<div class="quiz-detail-text" style="padding:8px 4px;color:#6b7280;">本页暂无数据。</div>';
        } else {
            listEl.innerHTML = pageItems.map(it =>
                `<div class="quiz-wrong-word-item" data-id="${escapeHtml(it.id || "")}" style="padding:6px 4px;cursor:pointer;">${escapeHtml(it.word || "")}</div>`
            ).join("");
            listEl.querySelectorAll(".quiz-wrong-word-item").forEach(el => {
                el.addEventListener("click", () => {
                    const id = el.getAttribute("data-id") || "";
                    const item = quizWrongWords.find(w => w.id === id);
                    if (item) fillQuizWrongDetail(item);
                });
            });
        }
        statusEl.textContent = `第 ${quizWrongPage} / ${totalPages} 页`;
        selectEl.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
            const opt = document.createElement("option");
            opt.value = String(i);
            opt.textContent = String(i);
            if (i === quizWrongPage) opt.selected = true;
            selectEl.appendChild(opt);
        }
    }

    function handleQuizSubmit() {
        const q = quizQuestions[quizIndex];
        const inputEl = document.getElementById("quiz-answer-input");
        const resultEl = document.getElementById("quiz-result-text");
        if (!q || !inputEl || !resultEl) return;
        const raw = String(inputEl.value || "").trim();
        if (!raw) {
            showToast("请输入答案");
            return;
        }
        const list = getWordList().map(normalizeItem);
        const item = list.find(w => w.id === q.wordId);
        let correct = false;
        if (q.type === 1) {
            // 词形精确匹配
            correct = raw.toLowerCase() === String(q.answerCorrect || "").trim().toLowerCase();
        } else if (q.type === 2 || q.type === 3) {
            const base = stripHtmlToText(q.answerCorrect || "").toLowerCase();
            correct = base.includes(raw.toLowerCase());
        } else {
            correct = raw.toLowerCase() === String(q.word || "").trim().toLowerCase();
        }

        // 更新答题统计
        if (item) {
            const today = formatDateYMD(new Date());
            item.quizCount = (item.quizCount || 0) + 1;
            if (correct) {
                item.quizCorrect = (item.quizCorrect || 0) + 1;
            }
            item.quizLastDate = today;
            saveWordList(list);
            fillQuizDetail(item);
            // 更新抽屉里的统计下次打开可见
        }

        if (correct) {
            quizCorrectCount += 1;
            resultEl.textContent = "回答正确！";
            resultEl.className = "quiz-result-text success";
        } else {
            resultEl.textContent = "回答错误，再接再厉～";
            resultEl.className = "quiz-result-text error";
        }
        setQuizProgressText();
        const btnNext = document.getElementById("btn-quiz-next");
        if (btnNext) btnNext.disabled = false;
    }

    function handleQuizNext() {
        quizIndex += 1;
        if (quizIndex >= 10 || quizIndex >= quizQuestions.length) {
            // 本组结束
            const finalEl = document.getElementById("quiz-final-summary");
            if (finalEl) {
                if (quizCorrectCount === 10) {
                    finalEl.innerHTML = '<span class="quiz-final-icon success">✓</span>太棒了~本组全部正确！请继续努力！';
                } else if (quizCorrectCount === 0) {

    async function initVocabData() {
        let list = [];
        try {
            const raw = localStorage.getItem(STORAGE_KEY);
            list = raw ? JSON.parse(raw) : [];
        } catch (e) {
            list = [];
        }
        const today = formatDateYMD(new Date());
        const needsMigrate = list.some(item =>
            item.level == null || item.reviewCount == null || !item.nextReview ||
            (item.meaning && !item.meaningZh) || item.tags == null || item.synonyms == null
        );
        if (needsMigrate) {
            list = list.map(item => ({
                ...item,
                level: item.level ?? 1,
                reviewCount: item.reviewCount ?? 0,
                nextReview: item.nextReview ?? today,
                meaningZh: item.meaningZh ?? (item.meaning || ""),
                meaningEn: item.meaningEn ?? "",
                pronunciation: item.pronunciation ?? "",
                tags: Array.isArray(item.tags) ? item.tags : [],
                synonyms: Array.isArray(item.synonyms) ? item.synonyms : []
            }));
        }
        vocabCache = list.slice();
        try {
            const res = await fetch("/api/vocab/state");
            if (res && res.ok) {
                const json = await res.json();
                if (json && json.success && json.data && Array.isArray(json.data.items)) {
                    const serverItems = json.data.items.map(normalizeItem);
                    vocabCache = serverItems;
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(serverItems));
                    } catch (_) {}
                    const rawTags = Array.isArray(json.data.tags) ? json.data.tags : [];
                    const seen = new Set();
                    vocabTags = [];
                    rawTags.forEach(function (t) {
                        if (!t) return;
                        const name = String(t.name || "").trim();
                        let scope = String(t.scope || "english").toLowerCase();
                        if (scope !== "chinese") scope = "english";
                        if (!name) return;
                        const key = name + "::" + scope;
                        if (seen.has(key)) return;
                        seen.add(key);
                        vocabTags.push({ name, scope });
                    });
                } else {
                    // 后端没有 tags 字段时，根据本地 items 构建初始标签库
                    const seen = new Set();
                    vocabTags = [];
                    vocabCache.forEach(function (it) {
                        if (!it || !Array.isArray(it.tags)) return;
                        const t = it.type || "english";
                        const scope = t === "chinese" ? "chinese" : "english";
                        it.tags.forEach(function (tag) {
                            const name = String(tag || "").trim();
                            if (!name) return;
                            const key = name + "::" + scope;
                            if (seen.has(key)) return;
                            seen.add(key);
                            vocabTags.push({ name, scope });
                        });
                    });
                }
            }
        } catch (e) {
            console.warn("load vocab from server failed", e);
        }
    }

                const seen = new Set();
                all.forEach(function (t) {
                    if (!t || t.scope !== scope) return;
                    const name = String(t.name || "").trim();
                    if (!name || seen.has(name)) return;
                    seen.add(name);
                    names.push(name);
                });
                // 简单按拼音/字母排序
                names.sort((a, b) => a.localeCompare(b, "zh-Hans-u-co-pinyin"));
                return names;
            }

            function refreshDropdown() {
                const keyword = (inputEl.value || "").trim().toLowerCase();
                const allNames = getScopedTagNames();
                const filtered = allNames.filter(function (name) {
                    return !keyword || name.toLowerCase().includes(keyword);
                });
                if (!filtered.length) {
                    dropdownEl.innerHTML = "";
                    dropdownEl.style.display = "none";
                    return;
                }
                dropdownEl.innerHTML = filtered
                    .map(function (name) {
                        return '<div class="vocab-tag-option" data-value="' + escapeHtml(name) + '">' + escapeHtml(name) + "</div>";
                    })
                    .join("");
                dropdownEl.style.display = "block";
            }

            inputEl.addEventListener("focus", function () {
                refreshDropdown();
            });
            inputEl.addEventListener("input", function () {
                refreshDropdown();
            });
            inputEl.addEventListener("keydown", function (e) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    const first = dropdownEl.querySelector(".vocab-tag-option");
                    if (first) {
                        const val = first.dataset.value || first.textContent || "";
                        const name = String(val).trim();
                        if (name && !drawerTags.includes(name)) {
                            drawerTags = drawerTags.concat([name]);
                            renderTags();
                        }
                        inputEl.value = "";
                        dropdownEl.style.display = "none";
                    } else {
                        if ((inputEl.value || "").trim()) {
                            showToast("请现在标签管理中添加。", "error");
                        }
                    }
                }
            });

            dropdownEl.addEventListener("mousedown", function (e) {
                const target = e.target.closest(".vocab-tag-option");
                if (!target) return;
                e.preventDefault();
                const val = target.dataset.value || target.textContent || "";
                const name = String(val).trim();
                if (name && !drawerTags.includes(name)) {
                    drawerTags = drawerTags.concat([name]);
                    renderTags();
                }
                inputEl.value = "";
                dropdownEl.style.display = "none";
            });
        })();

        // 同义词：仍然使用通用 chips 交互，支持自由输入
        bindChipInput(document.getElementById("drawer-synonyms-input"), () => drawerSynonyms, (v) => { drawerSynonyms = v; }, synWrap, renderSyn);
        var searchEnglishEl = document.getElementById("search-english");
        if (searchEnglishEl) searchEnglishEl.addEventListener("input", function() {
            pageEnglish = 1;
            renderEnglishList();
        });
        var searchChineseEl = document.getElementById("search-chinese");
        if (searchChineseEl) searchChineseEl.addEventListener("input", function() {
            pageChinese = 1;
            renderChineseList();
        });

        function bindTagFilterInput(type) {
            const input = document.getElementById("tag-filter-" + type);
            const dropdown = document.getElementById("tag-filter-" + type + "-dropdown");
            const wrap = document.getElementById("tag-filter-wrap-" + type);
            if (!input || !dropdown || !wrap) return;

            const applySelectedFromInput = () => {
                const v = String(input.value || "").trim();
                if (!v) {
                    if (type === "english") {
                        selectedTagEnglish = "";
                        pageEnglish = 1;
                        renderEnglishList();
                    } else {
                        selectedTagChinese = "";
                        pageChinese = 1;
                        renderChineseList();
                    }
                    return;
                }
                const options = (type === "english") ? tagOptionsEnglish : tagOptionsChinese;
                const ok = options.includes(v);
                if (ok) {
                    if (type === "english") {
                        selectedTagEnglish = v;
                        pageEnglish = 1;
                        renderEnglishList();
                    } else {
                        selectedTagChinese = v;
                        pageChinese = 1;
                        renderChineseList();
                    }
                }
            };

            input.addEventListener("focus", () => showTagDropdown(type, ""));
            input.addEventListener("click", () => showTagDropdown(type, ""));
            input.addEventListener("input", () => {
                // 输入中仅用于过滤选项；当清空时立即回到“全部标签”
                const v = String(input.value || "");
                if (!v.trim()) {
                    if (type === "english") {
                        selectedTagEnglish = "";
                        pageEnglish = 1;
                        renderEnglishList();
                    } else {
                        selectedTagChinese = "";
                        pageChinese = 1;
                        renderChineseList();
                    }
                }
                showTagDropdown(type, input.value);
            });
            input.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    hideTagDropdown(type);
                    input.blur();
                    return;
                }
                if (e.key === "Enter") {
                    e.preventDefault();
                    // 取当前过滤后的第一个选项；若无则按精确匹配应用
                    const opts = dropdown.querySelectorAll(".vocab-tag-option");
                    if (opts && opts.length > 0) {
                        const first = opts[0];
                        const val = first.dataset.value || "";
                        if (type === "english") {
                            selectedTagEnglish = val;
                            pageEnglish = 1;
                        } else {
                            selectedTagChinese = val;
                            pageChinese = 1;
                        }
                        input.value = val;
                        hideTagDropdown(type);
                        if (type === "english") renderEnglishList();
                        else renderChineseList();
                    } else {
                        applySelectedFromInput();
                        hideTagDropdown(type);
                    }
                }
            });
            input.addEventListener("blur", () => {
                setTimeout(() => hideTagDropdown(type), 120);
                setTimeout(() => applySelectedFromInput(), 0);
            });
        }

        bindTagFilterInput("english");
        bindTagFilterInput("chinese");

        document.addEventListener("click", function(e) {
            const t = e.target;
            const inEnglish = t && document.getElementById("tag-filter-wrap-english")?.contains(t);
            const inChinese = t && document.getElementById("tag-filter-wrap-chinese")?.contains(t);
            if (!inEnglish) hideTagDropdown("english");
            if (!inChinese) hideTagDropdown("chinese");
        });

        const typeFilter = document.getElementById("type-filter-english");
        if (typeFilter) {
            typeFilter.addEventListener("change", function() {
                selectedTypeEnglish = this.value || "";
                pageEnglish = 1;
                renderEnglishList();
            });
        }

        const engPrev = document.getElementById("vocab-english-prev");
        const engNext = document.getElementById("vocab-english-next");
        if (engPrev) engPrev.addEventListener("click", function() {
            if (pageEnglish > 1) {
                pageEnglish -= 1;
                renderEnglishList();
            }
        });
        if (engNext) engNext.addEventListener("click", function() {
            pageEnglish += 1;
            renderEnglishList();
        });
        (function() {
            const engTrigger = document.getElementById("vocab-english-page-select-trigger");
            const engDropdown = document.getElementById("vocab-english-page-select-dropdown");
            const zhTrigger = document.getElementById("vocab-chinese-page-select-trigger");
            const zhDropdown = document.getElementById("vocab-chinese-page-select-dropdown");
            if (engTrigger && engDropdown) {
                engTrigger.addEventListener("click", function(e) {
                    e.stopPropagation();
                    if (engTrigger.disabled) return;
                    engDropdown.classList.toggle("open");
                    if (zhDropdown) zhDropdown.classList.remove("open");
                });
                engDropdown.addEventListener("click", function(e) {
                    const p = e.target.getAttribute("data-page");
                    if (p) {
                        pageEnglish = parseInt(p, 10);
                        engDropdown.classList.remove("open");
                        renderEnglishList();
                    }
                });
            }
            if (zhTrigger && zhDropdown) {
                zhTrigger.addEventListener("click", function(e) {
                    e.stopPropagation();
                    if (zhTrigger.disabled) return;
                    zhDropdown.classList.toggle("open");
                    if (engDropdown) engDropdown.classList.remove("open");
                });
                zhDropdown.addEventListener("click", function(e) {
                    const p = e.target.getAttribute("data-page");
                    if (p) {
                        pageChinese = parseInt(p, 10);
                        zhDropdown.classList.remove("open");
                        renderChineseList();
                    }
                });
            }
            document.addEventListener("click", function() {
                if (engDropdown) engDropdown.classList.remove("open");
                if (zhDropdown) zhDropdown.classList.remove("open");
            });
        })();

        const zhPrev = document.getElementById("vocab-chinese-prev");
        const zhNext = document.getElementById("vocab-chinese-next");
        if (zhPrev) zhPrev.addEventListener("click", function() {
            if (pageChinese > 1) {
                pageChinese -= 1;
                renderChineseList();
            }
        });
        if (zhNext) zhNext.addEventListener("click", function() {
            pageChinese += 1;
            renderChineseList();
        });
        // 标签管理：新增标签
        const tagAddBtn = document.getElementById("tag-add-btn");
        if (tagAddBtn) {
            tagAddBtn.addEventListener("click", function() {
                const nameEl = document.getElementById("tag-new-name");
                const name = String(nameEl?.value || "").trim();
                const scopeInput = document.querySelector('input[name="tag-new-scope"]:checked');
                let scope = String(scopeInput?.value || "english").toLowerCase();
                if (scope !== "chinese") scope = "english";
                if (!name) {
                    showToast("×请填写标签名称。", "error");
                    return;
                }
                const exists = (vocabTags || []).some(t => t.name === name && t.scope === scope);
                if (exists) {
                    showToast("×标签已经存在，不能重复添加。", "error");
                    return;
                }
                vocabTags.push({ name, scope });
                if (nameEl) nameEl.value = "";
                // 同步到服务端
                syncVocabToServer(getWordList());
                refreshTagFilterOptions();
                renderTagsTable();
                showToast("标签已添加");
            });
        }

        // 标签管理分页按钮
        (function () {
            var prev = document.getElementById("vocab-tags-prev");
            var next = document.getElementById("vocab-tags-next");
            if (prev) {
                prev.addEventListener("click", function () {
                    if (pageTags > 1) {
                        pageTags -= 1;
                        renderTagsTable();
                    }
                });
            }
            if (next) {
                next.addEventListener("click", function () {
                    pageTags += 1;
                    renderTagsTable();
                });
            }
        })();

        // 单词本不再提供导入/导出 JSON 能力，这里不绑定相关按钮事件。
        document.querySelectorAll(".vocab-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".vocab-tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll(".review-section").forEach(s => s.classList.remove("active"));
                tab.classList.add("active");
                const id = "section-" + tab.dataset.tab;
                document.getElementById(id).classList.add("active");
                requestAnimationFrame(() => {
                    // 某些下拉在 hidden section 内初始化，切换到可见后需手动刷新可见性
                    if (typeof window.refreshUiSelectComboboxVisibility === "function") {
                        window.refreshUiSelectComboboxVisibility();
                    }
                });
                if (tab.dataset.tab === "english") renderEnglishList();
                else if (tab.dataset.tab === "chinese") renderChineseList();
                else if (tab.dataset.tab === "review") {
                    updateQuizSummary();
                    const area = document.getElementById("quiz-area");
                    if (area) area.style.display = "none";
                    quizInProgress = false;
                    const btnStart = document.getElementById("btn-quiz-start");
                    if (btnStart) btnStart.disabled = false;
                }
            });
        });
        renderEnglishList();
        renderChineseList();
        initReview();
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
