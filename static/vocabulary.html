                        byKey[key] = it;
                    });
                    items.forEach(function(raw) {
                        if (!raw || !raw.word) return;
                        var norm = normalizeItem(raw);
                        if ((norm.type || "english") !== "english") return;
                        var k = (norm.type || "english") + "::" + norm.word;
                        if (byKey[k]) {
                            var existing = byKey[k];
                            existing.pronunciation = norm.pronunciation || existing.pronunciation || "";
                            existing.meaningZh = norm.meaningZh || existing.meaningZh || "";
                            existing.meaningEn = norm.meaningEn || existing.meaningEn || "";
                            existing.tags = Array.isArray(norm.tags) && norm.tags.length ? norm.tags : (existing.tags || []);
                            existing.synonyms = Array.isArray(norm.synonyms) && norm.synonyms.length ? norm.synonyms : (existing.synonyms || []);
                            existing.pastTense = norm.pastTense ?? existing.pastTense ?? "";
                            existing.pastParticiple = norm.pastParticiple ?? existing.pastParticiple ?? "";
                            existing.presentParticiple = norm.presentParticiple ?? existing.presentParticiple ?? "";
                            existing.thirdPersonSingular = norm.thirdPersonSingular ?? existing.thirdPersonSingular ?? "";
                            existing.comparative = norm.comparative ?? existing.comparative ?? "";
                            existing.superlative = norm.superlative ?? existing.superlative ?? "";
                            existing.plural = norm.plural ?? existing.plural ?? "";
                        } else {
                            list.push(norm);
                            byKey[k] = norm;
                        }
                    });
                    saveWordList(list);
                    showToast("导入成功");
                    renderEnglishList();
                    renderChineseList();
                } catch (err) {
                    console.warn("import english vocab error", err);
                    showToast("导入失败：文件格式不正确");
                }
            };
            reader.readAsText(file, "utf-8");
        });
        var importChineseInput = document.createElement("input");
        importChineseInput.type = "file";
        importChineseInput.accept = "application/json";
        importChineseInput.style.display = "none";
        document.body.appendChild(importChineseInput);
        document.getElementById("btn-import-chinese").addEventListener("click", function() {
            importChineseInput.value = "";
            importChineseInput.click();
        });
        importChineseInput.addEventListener("change", function(e) {
            var file = e.target.files && e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function() {
                try {
                    var text = String(reader.result || "");
                    var json = JSON.parse(text);
                    var items = Array.isArray(json) ? json : (Array.isArray(json.items) ? json.items : []);
                    if (!items.length) {
                        showToast("导入失败：文件中没有数据");
                        return;
                    }
                    var list = getWordList();
                    var byKey = {};
                    list.forEach(function(it) {
                        var t = it.type === "chinese" || it.type === "phrase" ? it.type : (it.type || "english");
                        var key = t + "::" + (it.word || "");
                        byKey[key] = it;
                    });
                    items.forEach(function(raw) {
                        if (!raw || !raw.word) return;
                        var norm = normalizeItem(raw);
                        if (!(norm.type === "chinese" || norm.type === "phrase")) return;
                        var k = norm.type + "::" + norm.word;
                        if (byKey[k]) {
                            var existing = byKey[k];
                            existing.pronunciation = norm.pronunciation || existing.pronunciation || "";
                            existing.meaningZh = norm.meaningZh || existing.meaningZh || "";
                            existing.meaningEn = norm.meaningEn || existing.meaningEn || "";
                            existing.example = norm.example || existing.example || "";
                            existing.tags = Array.isArray(norm.tags) && norm.tags.length ? norm.tags : (existing.tags || []);
                            existing.synonyms = Array.isArray(norm.synonyms) && norm.synonyms.length ? norm.synonyms : (existing.synonyms || []);
                        } else {
                            list.push(norm);
                            byKey[k] = norm;
                        }
                    });
                    saveWordList(list);
                    showToast("导入成功");
                    renderEnglishList();
                    renderChineseList();
                } catch (err) {
                    console.warn("import chinese vocab error", err);
                    showToast("导入失败：文件格式不正确");
                }
            };
            reader.readAsText(file, "utf-8");
        });
        document.getElementById("btn-export-chinese").addEventListener("click", function() {
            exportJson(getWordList().filter(item => item.type === "chinese"), "中文词汇");
        });
        document.querySelectorAll(".vocab-tab").forEach(tab => {
            tab.addEventListener("click", () => {
                document.querySelectorAll(".vocab-tab").forEach(t => t.classList.remove("active"));
                document.querySelectorAll(".review-section").forEach(s => s.classList.remove("active"));
                tab.classList.add("active");
                const id = "section-" + tab.dataset.tab;
                document.getElementById(id).classList.add("active");
                if (tab.dataset.tab === "english") renderEnglishList();
                else if (tab.dataset.tab === "chinese") renderChineseList();
                else if (tab.dataset.tab === "review") renderReviewStats();
            });
        });
        renderEnglishList();
        renderChineseList();
        initReview();
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
